<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UCCL Asset Inspection Module — vNext</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;color:#333;padding:20px;font-size:16px}
    .container{max-width:1500px;margin:0 auto}
    .header,.card{background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-radius:15px;padding:30px;margin-bottom:30px;box-shadow:0 10px 30px rgba(0,0,0,.1)}
    .header{text-align:center}
    .header h1{color:#2d3748;font-size:2.5em;font-weight:700;margin-bottom:15px}
    .header p{font-size:1.1em;color:#666}
    .card-title{color:#2d3748;font-size:1.5em;font-weight:700;margin-bottom:25px;padding-bottom:15px;border-bottom:2px solid #e2e8f0}
    .form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:20px}
    .form-control{width:100%;padding:14px 18px;border:2px solid #e2e8f0;border-radius:8px;font-size:16px;transition:all .2s ease}
    .form-control:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.1)}
    .btn{padding:14px 28px;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s ease;margin:5px}
    .btn:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(0,0,0,.2)}
    .btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
    .btn-success{background:linear-gradient(135deg,#48bb78,#38a169);color:#fff}
    .btn-info{background:linear-gradient(135deg,#4299e1,#3182ce);color:#fff}
    .btn-warning{background:linear-gradient(135deg,#ed8936,#dd6b20);color:#fff}
    .btn-danger{background:linear-gradient(135deg,#f56565,#e53e3e);color:#fff}
    .btn[disabled]{opacity:.5;cursor:not-allowed}
    .alert{padding:18px;border-radius:8px;margin:18px 0;font-weight:500;font-size:16px}
    .alert-success{background:#c6f6d5;color:#22543d;border-left:4px solid #38a169}
    .alert-error{background:#fed7d7;color:#742a2a;border-left:4px solid #e53e3e}
    .alert-warning{background:#fefcbf;color:#744210;border-left:4px solid #d69e2e}
    .alert-info{background:#ebf8ff;color:#2b6cb0;border-left:4px solid #4299e1}
    .pill{display:inline-flex;align-items:center;gap:8px;background:#edf2f7;color:#2d3748;border-radius:999px;padding:6px 12px;margin:4px 8px 0 0;font-weight:600;font-size:13px}
    .dvir-table{width:100%;border-collapse:collapse;margin-top:25px;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,.1)}
    .dvir-table th{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:16px;text-align:left;font-weight:600;font-size:15px}
    .dvir-table td{padding:10px 12px;border-bottom:1px solid #e2e8f0;font-size:14px;vertical-align:top;line-height:1.4}
    .dvir-table tr:hover{background:#f7fafc}
    .status-safe{background:#c6f6d5;color:#22543d;padding:6px 12px;border-radius:6px;font-weight:600;font-size:13px}
    .status-unsafe{background:#fed7d7;color:#742a2a;padding:6px 12px;border-radius:6px;font-weight:600;font-size:13px}
    .status-unknown{background:#e2e8f0;color:#4a5568;padding:6px 12px;border-radius:6px;font-weight:600;font-size:13px}
    .muted{color:#718096;font-size:13px}
    .progress-bar{width:100%;background:#e2e8f0;border-radius:4px;overflow:hidden;margin:12px 0}
    .progress-fill{height:24px;background:linear-gradient(90deg,#667eea,#764ba2);transition:width 0.3s ease;display:flex;align-items:center;justify-content:center;color:white;font-size:14px;font-weight:600}
    .real-address{background:#d4edda;color:#155724;padding:8px 12px;border-radius:6px;font-weight:500;border-left:4px solid #28a745;font-size:14px}
    .coord-only{color:#666;font-style:italic;font-size:13px}
    .zone-pill{display:inline-block;background:#e2e8f0;border-radius:999px;padding:3px 8px;margin:2px;font-size:12px;color:#495057}
    .flex{display:flex;gap:16px;flex-wrap:wrap}
    .grow{flex:1}
    .right{margin-left:auto}
  </style>
</head>
<body>

      <h1>UCCL Asset Inspection Dashboard</h1>

    <div class="card">

        <input id="database" class="form-control" placeholder="Database" value="uccnz" />
      </div>

        <input id="username" class="form-control" placeholder="Username" value="francis@directt.co.nz" />
        <input id="password" class="form-control" type="password" placeholder="Password" value="@fr4nc1sWynn5" />
      </div>
      <button id="authButton" class="btn btn-primary">🔐 Authenticate</button>
      <div id="authResult"></div>
    </div>

    <div id="dvirSection" class="card" style="display:none;">
      <div class="flex">
        <h3 class="card-title grow">📋 Asset Inspection Reports</h3>
        <div class="pill">Full output mode <span title="All results; no manual limit">✅</span></div>
      </div>

      <div id="infoBanner" class="alert alert-info" style="display:none;"></div>
      <div id="progressContainer" style="display:none;">
        <div class="progress-bar">
          <div id="progressBar" class="progress-fill" style="width:0%;">0%</div>

        <select id="zoneFilter" class="form-control">
          <option value="__ALL__">All zones</option>

          <option value="heavy">Alerts for heavy equipment only</option>

      <div class="form-row">
        <label class="pill"><input type="checkbox" id="autoEmailOnDefect" /> Auto-email when a defect is logged</label>
        <label class="pill"><input type="checkbox" id="enableChecklistAlert" checked /> Alert if no checklist ≤ 5 min after ignition ON</label>
        <label class="pill"><input type="checkbox" id="liveMonitor" /> Live monitor (checks every 60s)</label>

      <div class="form-row">
        <input id="defaultHubo" class="form-control" placeholder="Enter hubodometer reading (optional)" />
        <button id="getDvir" class="btn btn-success">📋 Retrieve inspections</button>
        <button id="downloadCsv" class="btn btn-info" disabled>📊 Download Excel</button>
        <button id="downloadReport" class="btn btn-warning" disabled>📄 Download Details</button>
        <button id="logout" class="btn btn-danger right">🚪 Logout</button>
      </div>

      <div id="alertList"></div>
      <div id="dvirResult"></div>
    </div>
  </div>

<script>
let credentials = null;
let serverUsed = null;
let mappedDvirData = [];
let allZonesCache = [];
let devicesById = {};
let deviceGroups = {}; // basic heavy equipment check by group name contains keywords
let liveTimer = null;

function setDefaultDates(){
  const today = new Date();
  const lastWeek = new Date(today.getTime() - 7*24*60*60*1000);
  document.getElementById('toDate').value = today.toISOString().split('T')[0];
  document.getElementById('fromDate').value = lastWeek.toISOString().split('T')[0];
}
setDefaultDates();

function showMessage(elId, msg, type='info'){
  const el = document.getElementById(elId);
  const c = type==='error'?'alert-error':type==='success'?'alert-success':type==='warning'?'alert-warning':'alert-info';
  el.style.display = '';
  el.innerHTML = `<div class="alert ${c}">${msg}</div>`;
}

function updateProgress(current, total, text = '') {
  const container = document.getElementById('progressContainer');
  const bar = document.getElementById('progressBar');
  const textEl = document.getElementById('progressText');
  if (total === 0) { container.style.display = 'none'; return; }
  container.style.display = 'block';
  const percentage = Math.min(100, Math.round((current / total) * 100));
  bar.style.width = `${percentage}%`;
  bar.textContent = `${percentage}%`;
  textEl.textContent = text || `Processing ${current} of ${total}...`;
}

async function callGeotabAPI(method, params={}){
  if (window.geotab && typeof window.geotab.call === 'function'){
    return new Promise((resolve,reject)=>window.geotab.call(method, params, resolve, reject));
  }
  if (window.api && typeof window.api.call === 'function'){
    return new Promise((resolve,reject)=>window.api.call(method, params, resolve, reject));
  }
  const requestBody = { method, params: credentials ? {...params, credentials} : params };
  const res = await fetch(`https://${serverUsed}/apiv1`, {
    method:'POST', headers:{'Content-Type':'application/json','Accept':'application/json'}, body: JSON.stringify(requestBody)
  });
  if(!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
  const data = await res.json();
  if(data.error) throw new Error(data.error.message || data.error.name);
  return data.result;
}

function extractId(data){
  if(!data) return null;
  if(typeof data==='object' && data.id) return data.id;
  if(typeof data==='string'){ try{ return JSON.parse(data).id || null }catch(e){ return data } }
  return null;
}

function extractLocation(loc){
  if(!loc) return {latitude:null, longitude:null};
  if(typeof loc==='object'){
    if(loc.location && loc.location.x != null && loc.location.y != null) return {latitude:loc.location.y, longitude:loc.location.x};
    if(loc.x != null && loc.y != null) return {latitude:loc.y, longitude:loc.x};
  }
  if(typeof loc==='string'){
    try{
      const p = JSON.parse(loc);
      if(p.location && p.location.x != null && p.location.y != null) return {latitude:p.location.y, longitude:p.location.x};
      if(p.x != null && p.y != null) return {latitude:p.y, longitude:p.x};
    }catch(e){}
  }
  return {latitude:null, longitude:null};
}

async function getGeotabAddresses(coordinates) {
  if (!coordinates.length) return [];
  const geotabCoords = coordinates.map(c => ({ x: Number(c.lon), y: Number(c.lat) }));
  try {
    const results = await callGeotabAPI('GetAddresses', { coordinates: geotabCoords });
    return results.map(r => ({
      formattedAddress: (r && (r.formattedAddress || r.FormattedAddress)) || '',
      zones: (r && (r.zones || r.Zones) || []).map(z => (z && (z.name || z.Name)) || '').filter(Boolean)
    }));
  } catch (error) {
    return coordinates.map(() => ({ formattedAddress: '', zones: [] }));
  }
}

async function resolveAllAddresses(rows) {
  const points = [];
  rows.forEach((r, idx) => {
    if (r.latitude != null && r.longitude != null) {
      points.push({ lat: r.latitude, lon: r.longitude, idx });
    }
  });
  if (!points.length) return;
  const BATCH_SIZE = 50;
  for (let start = 0; start < points.length; start += BATCH_SIZE) {
    const chunk = points.slice(start, start + BATCH_SIZE);
    const progress = Math.min(start + BATCH_SIZE, points.length);
    updateProgress(progress, points.length, `Resolving addresses ${progress}/${points.length}...`);
    try {
      const addresses = await getGeotabAddresses(chunk);
      addresses.forEach((addr, i) => {
        const rowIndex = chunk[i].idx;
        const row = rows[rowIndex];
        if (addr.formattedAddress && addr.formattedAddress.trim()) {
          row.resolvedAddress = addr.formattedAddress.trim();
          row.zones = addr.zones || [];
        }
      });
      renderTable(rows);
    } catch (error) {}
    if (start + BATCH_SIZE < points.length) {
      await new Promise(resolve => setTimeout(resolve, 500));
    }
  }
  updateProgress(points.length, points.length, 'Complete!');
}

function renderTable(rows){
  const zoneSel = document.getElementById('zoneFilter').value;
  const filtered = zoneSel === '__ALL__' ? rows : rows.filter(r => (r.zones||[]).includes(zoneSel));
  const resultDiv = document.getElementById('dvirResult');
  let html = `<table class="dvir-table"><thead><tr>
    <th>Date/Time</th><th>Driver</th><th>Vehicle</th><th>Status</th><th>Driver Inspected</th>
    <th>Defects</th><th>Location</th><th>Zones</th><th>Odometer</th><th>Engine Hours</th><th>Hubodometer</th><th>Remarks</th>
  </tr></thead><tbody>`;

  rows.forEach((r, index) => {
    const status = r.isSafeToOperate===true?'<span class="status-safe">SAFE</span>':
                  r.isSafeToOperate===false?'<span class="status-unsafe">⚠️ UNSAFE</span>':'<span class="status-unknown">UNKNOWN</span>';
    let defectDisplay = '<em class="muted">None</em>';
    if (r.defects && r.defects !== '[]' && r.defects !== '') {
      try{ const d = JSON.parse(r.defects); if(Array.isArray(d)&&d.length>0) defectDisplay = `<span style="color:#e53e3e;font-weight:600;">⚠️ ${d.length}</span>`; }
      catch(e){ if(r.defects.length>10) defectDisplay = '<span style="color:#e53e3e;font-weight:600;">⚠️ Defects present</span>'; }
    }

    let locationDisplay = '<em class="muted">No location</em>';
    if (r.latitude != null && r.longitude != null) {
      if (r.resolvedAddress && r.resolvedAddress.trim() && r.resolvedAddress.length > 8) {
        locationDisplay = `<div class="real-address">📍 ${r.resolvedAddress}</div>`;
      } else {
        const coords = `${Number(r.latitude).toFixed(6)}, ${Number(r.longitude).toFixed(6)}`;
        locationDisplay = `<span class="coord-only">${coords}</span>`;
      }
    }

    const zones = (r.zones||[]).map(z=>`<span class="zone-pill">${z}</span>`).join('');

    html += `<tr>
      <td>${r.dateTime}</td>
      <td><strong>${r.driverName}</strong></td>
      <td><strong>${r.vehicleName}</strong></td>
      <td>${status}</td>
      <td>${r.isInspectedByDriver===true?'✅ Yes':'❌ No'}</td>
      <td>${defectDisplay}</td>
      <td>${locationDisplay}</td>
      <td>${zones || '<span class="muted">—</span>'}</td>
      <td>${r.odometer?Math.round(r.odometer/1000*100)/100+' km':'N/A'}</td>
      <td>${r.engineHours?Math.round(r.engineHours/3600*100)/100+' hrs':'N/A'}</td>
      <td>${r.hubodometer ?? ''}</td>
      <td>${r.driverRemark || '<em class="muted">No remarks</em>'}</td>
    </tr>`;
  });
  html += `</tbody></table>`;
  resultDiv.innerHTML = html;
}

async function loadZonesAndDevices() {
  try {
    const [zones, groups, devices] = await Promise.all([
      callGeotabAPI('Get', { typeName:'Zone', search:{} , resultsLimit: 100000 }),
      callGeotabAPI('Get', { typeName:'Group', search:{} , resultsLimit: 100000 }),
      callGeotabAPI('Get', { typeName:'Device', search:{} , resultsLimit: 100000 })
    ]);
    allZonesCache = zones || [];
    const zoneSel = document.getElementById('zoneFilter');
    allZonesCache.sort((a,b)=> (a.name||'').localeCompare(b.name||''));
    allZonesCache.forEach(z => {
      const opt = document.createElement('option');
      opt.value = z.name || z.id; opt.textContent = z.name || z.id;
      zoneSel.appendChild(opt);
    });
    // devices map
    devicesById = {};
    devices.forEach(d=>{ devicesById[d.id] = d; });
    // group names for heavy equipment heuristic
    deviceGroups = {};
    devices.forEach(d => {
      const groupNames = (d.groups || []).map(g => groups.find(x=>x.id===g.id)?.name || '').filter(Boolean);
      deviceGroups[d.id] = groupNames.join('|').toLowerCase();
    });
  } catch(e) { /* non-fatal */ }
}

function isHeavyEquipment(deviceId){
  const names = deviceGroups[deviceId] || '';
  return /(heavy|plant|excavator|loader|digger|roller|bulldozer|grader|skid|telehandler|forklift)/i.test(names);
}

async function fetchDVIRFull(fromDate, toDate){
  // Try to pull a very large batch; Geotab may cap server-side but we'll request high.
  const dvirLogs = await callGeotabAPI('Get', {
    typeName:'DVIRLog',
    search:{ fromDate: fromDate+'T00:00:00.000Z', toDate: toDate+'T23:59:59.000Z' },
    resultsLimit: 100000
  });
  return dvirLogs || [];
}

async function buildLookups(dvirLogs){
  const driverIds = new Set(), deviceIds = new Set();
  dvirLogs.forEach(l=>{ const did = extractId(l.driver); const vid = extractId(l.device); if(did) driverIds.add(did); if(vid) deviceIds.add(vid); });
  const calls = [];
  Array.from(driverIds).forEach(id=>calls.push({method:'Get', params:{typeName:'User', search:{id}}}));
  Array.from(deviceIds).forEach(id=>calls.push({method:'Get', params:{typeName:'Device', search:{id}}}));
  const lookup = calls.length ? await callGeotabAPI('ExecuteMultiCall', { calls }) : [];
  const driverNames = {}; const deviceNames={}; let idx=0;
  Array.from(driverIds).forEach(id=>{ const r=lookup[idx++]; driverNames[id]=(r && r[0] && (r[0].name || `${r[0].firstName||''} ${r[0].lastName||''}`.trim())) || `Driver ${id}`; });
  Array.from(deviceIds).forEach(id=>{ const r=lookup[idx++]; deviceNames[id]=(r && r[0] && r[0].name) || `Device ${id}`; });
  return {driverNames, deviceNames};
}

async function getIgnitionOnEvents(sinceIso){
  // Pull recent ignition changes via StatusData Diagnostic "Ignition" where value=true
  try {
    const diags = await callGeotabAPI('Get', { typeName:'Diagnostic', search:{ name: 'Ignition' }, resultsLimit: 10 });
    const ignitionDiag = diags && diags[0];
    if(!ignitionDiag) return [];
    const status = await callGeotabAPI('Get', { typeName:'StatusData', search:{ fromDate: sinceIso, diagnosticSearch: { id: ignitionDiag.id } }, resultsLimit: 10000 });
    return (status||[]).filter(s => s.data && (s.data.toString()==='true' || s.data === true));
  } catch(e){ return []; }
}

function renderAlerts(alerts){
  const host = document.getElementById('alertList');
  if(!alerts.length){ host.innerHTML = ''; return; }
  const blocks = alerts.map(a => `<div class="alert alert-warning">⚠️ <strong>${a.vehicleName}</strong> (${a.driverName || 'Unknown'}) ignition ON at ${a.ignOnTime}. No checklist submitted within 5 minutes.</div>`).join('');
  host.innerHTML = blocks;
}

async function checkChecklistAlerts(fromDate, toDate){
  const scope = document.getElementById('scopeFilter').value; // heavy | all
  const fiveMinMs = 5*60*1000;
  const now = new Date();
  const since = new Date(now.getTime() - 60*60*1000).toISOString(); // last 60m window for live check
  const ignitions = await getIgnitionOnEvents(since);

  // Build latest DVIR by device within 10 minutes window
  const dvir = mappedDvirData;
  const latestByDevice = {};
  dvir.forEach(r => {
    const t = new Date(r.dateTime).getTime();
    const prev = latestByDevice[r.deviceId]?.t || 0;
    if (t > prev) latestByDevice[r.deviceId] = { t, row: r };
  });

  const alerts = [];
  ignitions.forEach(s => {
    const devId = extractId(s.device);
    if(!devId) return;
    if (scope === 'heavy' && !isHeavyEquipment(devId)) return;
    const ignTime = new Date(s.dateTime).getTime();
    const latest = latestByDevice[devId];
    if (!latest || (latest.t - ignTime) > fiveMinMs || latest.t < ignTime) {
      const row = latest?.row;
      alerts.push({
        vehicleName: row?.vehicleName || devicesById[devId]?.name || `Device ${devId}`,
        driverName: row?.driverName || '',
        ignOnTime: new Date(ignTime).toLocaleTimeString()
      });
    }
  });
  renderAlerts(alerts);
}

async function retrieveAndRender(){
  const fromDate = document.getElementById('fromDate').value;
  const toDate = document.getElementById('toDate').value;
  if(!fromDate || !toDate){ showMessage('infoBanner','Please select both from and to dates','error'); return; }
  showMessage('infoBanner','Getting Asset Inspection logs (full output)...','warning');
  document.getElementById('downloadCsv').disabled = true;
  document.getElementById('downloadReport').disabled = true;

  try{
    const dvirLogs = await fetchDVIRFull(fromDate, toDate);
    if(!dvirLogs || dvirLogs.length===0){ 
      showMessage('infoBanner','No DVIR logs for the selected range','warning'); 
      document.getElementById('dvirResult').innerHTML=''; 
      return; 
    }

    const lookups = await buildLookups(dvirLogs);

    mappedDvirData = dvirLogs.map(l=>{
      const driverId = extractId(l.driver);
      const deviceId = extractId(l.device);
      const loc = extractLocation(l.location);
      return {
        id:l.id,
        dateTime:new Date(l.dateTime).toLocaleString(),
        driverName:lookups.driverNames[driverId] || 'Unknown Driver',
        driverId:driverId || '',
        vehicleName:lookups.deviceNames[deviceId] || 'Unknown Vehicle',
        deviceId:deviceId || '',
        isSafeToOperate:l.isSafeToOperate,
        isInspectedByDriver:l.isInspectedByDriver,
        driverRemark:l.driverRemark || '',
        odometer:l.odometer || 0,
        engineHours:l.engineHours || 0,
        latitude:loc.latitude,
        longitude:loc.longitude,
        resolvedAddress:'',
        zones:[],
        defects:l.defects || '',
        hubodometer: document.getElementById('defaultHubo').value || ''
      };
    });

    renderTable(mappedDvirData);

    const locationsToResolve = mappedDvirData.filter(r => r.latitude != null && r.longitude != null);
    if (locationsToResolve.length > 0) {
      showMessage('infoBanner', `🌍 Resolving ${locationsToResolve.length} addresses using Geotab GetAddresses...`, 'info');
      await resolveAllAddresses(mappedDvirData);
      const successCount = mappedDvirData.filter(r => r.resolvedAddress && r.resolvedAddress.trim()).length;
      const failCount = locationsToResolve.length - successCount;
      showMessage('infoBanner', `✅ Address resolution: ${successCount}/${locationsToResolve.length} succeeded${failCount>0?`, ${failCount} failed`:''}.`, 'success');
    } else {
      showMessage('infoBanner', '✅ DVIR loaded! No locations to resolve.', 'success');
    }

    document.getElementById('downloadCsv').disabled = false;
    document.getElementById('downloadReport').disabled = false;

    // Initial alert check
    if (document.getElementById('enableChecklistAlert').checked) {
      await checkChecklistAlerts(fromDate, toDate);
    }

  }catch(e){
    showMessage('infoBanner', `Failed: ${e.message}`, 'error');
  }
}

function exportCsv(){
  if(!mappedDvirData || mappedDvirData.length===0){ showMessage('infoBanner','No DVIR data to export','warning'); return; }
  const headers = ['DateTime','Driver_Name','Vehicle_Name','Safe_To_Operate','Driver_Inspected','Has_Defects','Defect_Count','Address','Zones','Latitude','Longitude','Odometer_km','Engine_Hours','Hubodometer','Driver_Remarks'];
  let csv = headers.map(h=>`"${h}"`).join(',') + '\n';
  mappedDvirData.forEach(r=>{
    let hasDefects='NO', defectCount='0';
    if (r.defects && r.defects !== '[]' && r.defects !== '') {
      try{ const d = JSON.parse(r.defects); if(Array.isArray(d)&&d.length>0){ hasDefects='YES'; defectCount=String(d.length); } }
      catch(e){ if(r.defects.length>10){ hasDefects='YES'; defectCount='Unknown'; } }
    }
    const row = [
      r.dateTime, r.driverName, r.vehicleName,
      r.isSafeToOperate===true?'SAFE':r.isSafeToOperate===false?'UNSAFE':'UNKNOWN',
      r.isInspectedByDriver===true?'YES':'NO',
      hasDefects, defectCount,
      r.resolvedAddress || `${r.latitude || ''}, ${r.longitude || ''}`,
      (r.zones||[]).join(' | '),
      r.latitude || '', r.longitude || '',
      r.odometer ? Math.round(r.odometer/1000*100)/100 : '', r.engineHours ? Math.round(r.engineHours/3600*100)/100 : '', r.hubodometer || '', r.driverRemark || ''
    ].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',');
    csv += row + '\n';
  });
  const ts = new Date().toISOString().slice(0,19).replace(/[:.]/g,'-');
  const filename = `Geotab_DVIR_Full_${ts}.csv`;
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  const url = URL.createObjectURL(blob);
  a.href = url; a.download = filename; a.style.display='none';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  showMessage('infoBanner', `📊 CSV "${filename}" downloaded`, 'success');
}

function exportHtml(){
  if(!mappedDvirData || mappedDvirData.length===0){ showMessage('infoBanner','No DVIR data to report','warning'); return; }
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>DVIR Report (Full)</title>
  <style>
    body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;margin:25px;color:#333;font-size:16px;line-height:1.5}
    h1{margin:0 0 8px 0;font-size:2.0em;color:#2d3748} .muted{color:#666;font-size:15px}
    table{width:100%;border-collapse:collapse;margin-top:20px}
    th,td{border:1px solid #e2e8f0;padding:10px;font-size:14px;text-align:left;vertical-align:top}
    th{background:#2c5aa0;color:#fff;font-weight:600}
    tr:nth-child(even){background:#f7fafc}
    .badge{padding:4px 8px;border-radius:4px;font-weight:700;font-size:13px;display:inline-block}
    .safe{background:#c6f6d5;color:#22543d}
    .unsafe{background:#fed7d7;color:#742a2a}
    .unknown{background:#e2e8f0;color:#4a5568}
    .real-address{background:#d4edda;color:#155724;padding:6px 8px;border-radius:5px;font-weight:500}
    .coord-only{color:#666;font-style:italic;font-size:14px}
  </style></head><body>
  <h1>Asset Inspection Report — Full Output</h1>
   <table><thead><tr>
    <th>Date/Time</th><th>Driver</th><th>Vehicle</th><th>Status</th><th>Defects</th><th>Location</th><th>Zones</th><th>Odometer</th><th>Engine Hours</th><th>Hubodometer</th><th>Remarks</th>
  </tr></thead><tbody>
  ${mappedDvirData.map(r=>{
    let defects='None';
    if (r.defects && r.defects !== '[]' && r.defects !== '') {
      try{ const d = JSON.parse(r.defects); if(Array.isArray(d)&&d.length>0) defects = `⚠️ ${d.length}`; }
      catch(e){ if(r.defects.length>10) defects = '⚠️ Yes'; }
    }
    const badge = r.isSafeToOperate===true?'<span class="badge safe">SAFE</span>':r.isSafeToOperate===false?'<span class="badge unsafe">UNSAFE</span>':'<span class="badge unknown">UNKNOWN</span>';
    let loc = 'No location';
    if (r.latitude != null && r.longitude != null) {
      if (r.resolvedAddress && r.resolvedAddress.trim()) {
        const zones = r.zones && r.zones.length ? `<div style="margin-top:3px;font-size:12px;color:#666;">${r.zones.join(' | ')}</div>` : '';
        loc = `<div class="real-address">📍 ${r.resolvedAddress}</div>${zones}`;
      } else {
        const coords = `${Number(r.latitude).toFixed(6)}, ${Number(r.longitude).toFixed(6)}`;
        loc = `<span class="coord-only">${coords}</span>`;
      }
    }
    return `<tr>
      <td>${r.dateTime}</td>
      <td>${r.driverName}</td>
      <td>${r.vehicleName}</td>
      <td>${badge}</td>
      <td>${defects}</td>
      <td>${loc}</td>
      <td>${(r.zones||[]).join(' | ')}</td>
      <td>${r.odometer?Math.round(r.odometer/1000*100)/100+' km':'N/A'}</td>
      <td>${r.engineHours?Math.round(r.engineHours/3600*100)/100+' hrs':'N/A'}</td>
      <td>${r.hubodometer || ''}</td>
      <td>${r.driverRemark || ''}</td>
    </tr>`;
  }).join('')}
  </tbody></table>
  </body></html>`;
  const ts = new Date().toISOString().slice(0,19).replace(/[:.]/g,'-');
  const filename = `DVIR_Report_Full_${ts}.html`;
  const blob = new Blob([html], {type:'text/html;charset=utf-8;'});
  const a = document.createElement('a');
  const url = URL.createObjectURL(blob);
  a.href = url; a.download = filename; a.style.display='none';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  showMessage('infoBanner', `📄 Report "${filename}" downloaded`, 'success');
}

function maybeSendDefectEmails(){
  const enabled = document.getElementById('autoEmailOnDefect').checked;
  const to = (document.getElementById('defectEmailTo').value || '').trim();
  if(!enabled || !to) return;
  const recipients = to.split(',').map(s=>s.trim()).filter(Boolean);
  const defects = mappedDvirData.filter(r => {
    if (!r.defects || r.defects === '[]') return false;
    try { const d = JSON.parse(r.defects); return Array.isArray(d) && d.length>0; } catch(e){ return r.defects.length>10; }
  });
  if(!defects.length) return;
  // Build a simple mailto draft (client-only). For production use a webhook.
  const subject = encodeURIComponent(`DVIR defects — ${new Date().toLocaleString()}`);
  const body = encodeURIComponent(defects.map(r => `${r.dateTime} — ${r.vehicleName} — ${r.driverName} — ${r.resolvedAddress || (r.latitude+','+r.longitude)} — Hubo:${r.hubodometer||''}`).join('\n'));
  const mailto = `mailto:${encodeURIComponent(recipients.join(','))}?subject=${subject}&body=${body}`;
  window.location.href = mailto;
}

// UI wiring

document.getElementById('authButton').onclick = async function(){
  const server = document.getElementById('server').value.trim();
  const database = document.getElementById('database').value.trim();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if(!server || !database || !username || !password){ showMessage('authResult','Please fill in all fields','error'); return; }
  try{
    showMessage('authResult','Authenticating...','warning');
    serverUsed = server;
    const res = await callGeotabAPI('Authenticate', { userName:username, password, database });
    if(res.path && res.path !== 'ThisServer'){
      serverUsed = res.path;
      const res2 = await callGeotabAPI('Authenticate', { userName:username, password, database });
      credentials = res2.credentials;
    } else {
      credentials = res.credentials;
    }
    showMessage('authResult','Authentication successful!','success');
    document.getElementById('dvirSection').style.display = '';
    await loadZonesAndDevices();
  }catch(e){
    showMessage('authResult',`Authentication failed: ${e.message}`,'error');
  }
};

document.getElementById('getDvir').onclick = retrieveAndRender;

document.getElementById('zoneFilter').onchange = () => renderTable(mappedDvirData);

document.getElementById('downloadCsv').onclick = function(){ exportCsv(); maybeSendDefectEmails(); };

document.getElementById('downloadReport').onclick = exportHtml;

document.getElementById('logout').onclick = function(){
  credentials = null; serverUsed = null; mappedDvirData = []; devicesById={}; deviceGroups={};
  if(liveTimer){ clearInterval(liveTimer); liveTimer=null; }
  document.getElementById('dvirSection').style.display = 'none';
  document.getElementById('authResult').innerHTML = '';
  document.getElementById('dvirResult').innerHTML = '';
  document.getElementById('alertList').innerHTML = '';
  showMessage('infoBanner','Logged out','info');
};

// Live monitor polling

document.getElementById('liveMonitor').addEventListener('change', function(){
  if(this.checked){
    if(liveTimer) clearInterval(liveTimer);
    liveTimer = setInterval(async ()=>{
      if(credentials && document.getElementById('enableChecklistAlert').checked){
        await checkChecklistAlerts(document.getElementById('fromDate').value, document.getElementById('toDate').value);
      }
    }, 60000);
  } else {
    if(liveTimer) { clearInterval(liveTimer); liveTimer=null; }
  }
});

// Auto set defaults in Drive environment
if (window.geotab || window.api || (window.location && /geotab\.com/i.test(window.location.host))) {
  document.getElementById('dvirSection').style.display='';
}
</script>
