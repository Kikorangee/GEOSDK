<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geotab Utilization & Emissions – Attached API (Fast, Batched)</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#0f172a;color:#111;padding:22px}
    .container{max-width:1400px;margin:0 auto}
    .header,.card{background:rgba(255,255,255,.96);backdrop-filter:blur(6px);border-radius:14px;padding:22px;margin-bottom:22px;box-shadow:0 10px 28px rgba(0,0,0,.12)}
    .header{text-align:center}
    .header h1{color:#0f172a;font-size:2em;margin-bottom:6px}
    .muted{color:#64748b}
    .row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
    .form-control,.form-select{width:100%;padding:11px 14px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px}
    .btn{padding:11px 18px;border:none;border-radius:10px;font-weight:600;cursor:pointer;margin:4px}
    .btn-primary{background:linear-gradient(135deg,#14532d,#1e40af);color:#fff}
    .btn-green{background:#16a34a;color:#fff}
    .btn-blue{background:#2563eb;color:#fff}
    .btn-red{background:#ef4444;color:#fff}
    .btn-amber{background:#f59e0b;color:#fff}
    .btn[disabled]{opacity:.5;cursor:not-allowed}
    .alert{padding:12px 14px;border-radius:10px;margin:10px 0;font-weight:600}
    .alert-info{background:#e0f2fe;color:#075985;border-left:5px solid #38bdf8}
    .alert-success{background:#dcfce7;color:#065f46;border-left:5px solid #22c55e}
    .alert-warning{background:#fef9c3;color:#713f12;border-left:5px solid #f59e0b}
    .alert-danger{background:#fee2e2;color:#7f1d1d;border-left:5px solid #ef4444}
    .progress{height:18px;background:#e2e8f0;border-radius:9px;overflow:hidden;margin-top:8px}
    .progress > div{height:100%;background:linear-gradient(90deg,#14532d,#1e40af);color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center}
    .table{width:100%;border-collapse:collapse;margin-top:12px;background:#fff;border-radius:10px;overflow:hidden}
    .table th{background:#0f172a;color:#fff;padding:10px;text-align:left}
    .table td{padding:9px 10px;border-bottom:1px solid #e2e8f0;font-size:13px;vertical-align:top}
    tr.row-estimated{background:#fff7ed}
    .badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:800;border:1px solid #e2e8f0}
    .b-act{background:#dcfce7;color:#14532d;border-color:#22c55e}
    .b-est{background:#fef3c7;color:#92400e;border-color:#f59e0b}
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js">
let _co2BarChart = null;
let _co2PieChart = null;

function renderCharts(rows, fromISO, toISO){
  if(!rows || !rows.length){ 
    document.getElementById('chartsCard').style.display='none';
    return;
  }
  // Sort by CO2 desc
  const sorted = [...rows].sort((a,b)=> b.co2 - a.co2);
  const labels = sorted.map(r=>r.deviceName);
  const data = sorted.map(r=>r.co2);

  const hi = sorted[0];
  const lo = sorted[sorted.length-1];
  const dateLabel = new Date(fromISO).toISOString().slice(0,10) + " → " + new Date(toISO).toISOString().slice(0,10);
  document.getElementById('chartsSubtitle').textContent = `Highest: ${hi.deviceName} (${hi.co2} kg) • Lowest: ${lo.deviceName} (${lo.co2} kg) • Range: ${dateLabel}`;

  // Colors: highlight highest (first) and lowest (last)
  const base = Array(data.length).fill('#60a5fa');
  if(data.length>0) base[0] = '#ef4444';
  if(data.length>1) base[data.length-1] = '#22c55e';

  const barCtx = document.getElementById('co2Bar').getContext('2d');
  if(_co2BarChart) _co2BarChart.destroy();
  _co2BarChart = new Chart(barCtx, {
    type: 'bar',
    data: { labels, datasets: [{ label: 'CO₂ (kg)', data, backgroundColor: base }] },
    options: { responsive:true, plugins:{ legend:{ display:true } }, scales:{ y:{ beginAtZero:true } } }
  });

  // Pie (share)
  const pieCtx = document.getElementById('co2Pie').getContext('2d');
  if(_co2PieChart) _co2PieChart.destroy();
  _co2PieChart = new Chart(pieCtx, {
    type: 'doughnut',
    data: { labels, datasets: [{ label: 'Share of CO₂', data }] },
    options: { responsive:true, plugins:{ legend:{ display:true, position:'right' } } }
  });

  document.getElementById('chartsCard').style.display='block';
}

function renderLegend(){
  const el = document.getElementById('legendText');
  el.innerHTML = `
    <ul style="margin-left:16px;">
      <li><strong>Distance (km)</strong> = Δ of <code>DiagnosticOdometerAdjustmentId</code> between selected From → To.</li>
      <li><strong>Fuel (L)</strong> = Δ of <code>DiagnosticDeviceTotalFuelId</code> over the same window.</li>
      <li><strong>CO₂ (kg)</strong> = Fuel (L) × 2.68 (diesel emission factor).</li>
      <li><strong>Actual vs Estimated</strong>:
        <ul style="margin-left:16px;">
          <li><span class="badge b-act">Actual</span> when fuel delta is available.</li>
          <li><span class="badge b-est">Estimated</span> only when no fuel points exist in the window:
            <ul style="margin-left:16px;">
              <li>If distance exists: 25 L/100km fallback</li>
              <li>If no distance: 15 L/hour conservative estimate (assumed limited operation)</li>
            </ul>
          </li>
        </ul>
      </li>
      <li><strong>Window</strong> = exactly the dates you picked in the browser tool.</li>
    </ul>
  `;
  document.getElementById('legendCard').style.display='block';
}

</script>

</head>
<body>
<div class="container">
  <div class="header">
    <h1>🚛 Utilization & Emissions – Attached API (Fast)</h1>
    <div class="muted">Fuel from <code>DiagnosticDeviceTotalFuelId</code> delta; distance from <code>DiagnosticOdometerAdjustmentId</code>. Batched calls, progress, cancel, timeouts.</div>
  </div>

  <div class="card">
    <h3>🔐 Authentication</h3>
    <div class="row" style="margin-top:8px">
      <input id="server" class="form-control" placeholder="Server" value="my.geotab.com" />
      <input id="database" class="form-control" placeholder="Database" value="UCCNZ" />
    </div>
    <div class="row" style="margin-top:8px">
      <input id="username" class="form-control" placeholder="Username" value="francis@directt.co.nz" />
      <input id="password" class="form-control" type="password" placeholder="Password" value="@fr4nc1sWynn5" />
    </div>
    <div>
      <button id="authBtn" class="btn btn-primary">🔑 Authenticate</button>
      <button id="useSession" class="btn btn-blue">🧩 Use MyGeotab Session</button>
      <button id="logout" class="btn btn-red">🚪 Logout</button>
    </div>
    <div id="authResult" style="margin-top:8px"></div>
  </div>

  <div id="reportCard" class="card" style="display:none;">
    <h3>📊 Report</h3>
    <div class="row">
      <input id="fromDate" class="form-control" type="date" />
      <input id="toDate" class="form-control" type="date" />
      <input id="limit" class="form-control" placeholder="Asset limit" value="300" />
      <input id="resultsLimit" class="form-control" placeholder="Per-device StatusData limit" value="1000" />
      <input id="concurrency" class="form-control" placeholder="Parallel devices" value="8" />
      <input id="timeoutSec" class="form-control" placeholder="Batch timeout (sec)" value="45" />
    </div>
    <div style="margin-top:10px">
      <button id="runBtn" class="btn btn-green">📊 Generate</button>
      <button id="cancelBtn" class="btn btn-amber" disabled>⛔ Cancel</button>
    </div>
    <div id="banner" style="margin-top:10px"></div>
    <div class="progress"><div id="progressFill" style="width:0%">0%</div></div>
    <div id="progressText" class="muted" style="text-align:center;margin-top:6px;"></div>
    <div id="tableWrap" style="margin-top:10px"></div>

    <div class="card" id="chartsCard" style="display:none; margin-top:12px;">
      <h3>📈 Weekly CO₂ Emissions</h3>
      <div class="muted" id="chartsSubtitle" style="margin:6px 0 10px 0;"></div>

      <h3>ℹ️ Methodology & Calculations</h3>
      <div class="muted" id="legendText" style="margin-top:8px; line-height:1.5;"></div>
    </div>

  </div>
</div>

<script>
let credentials=null, serverUsed=null;
let cancelFlag=false;

function setDefaults(){
  const today = new Date();
  const last = new Date(today.getTime() - 14*24*3600*1000);
  document.getElementById('toDate').value = today.toISOString().split('T')[0];
  document.getElementById('fromDate').value = last.toISOString().split('T')[0];
}
setDefaults();

function msg(id, text, type='info'){
  const cls = type==='success'?'alert-success':type==='warning'?'alert-warning':type==='danger'?'alert-danger':'alert-info';
  document.getElementById(id).innerHTML = `<div class="alert ${cls}">${text}</div>`;
}
function setProgress(done,total,label=''){
  const fill = document.getElementById('progressFill');
  const txt = document.getElementById('progressText');
  const pct = total? Math.round(done/total*100) : 0;
  fill.style.width = pct+'%'; fill.textContent = pct+'%';
  txt.textContent = label || `${done}/${total}`;
}
function idOf(x){ if(!x) return null; if(typeof x==='object' && x.id) return x.id; if(typeof x==='string') return x; try{ return JSON.parse(x).id || null }catch(e){ return null } }

async function callGeotabAPI(method, params={}){
  if (window.geotab && typeof window.geotab.call==='function'){
    return new Promise((res,rej)=>window.geotab.call(method, params, res, rej));
  }
  if (window.api && typeof window.api.call==='function'){
    return new Promise((res,rej)=>window.api.call(method, params, res, rej));
  }
  const rpc = { id:1, jsonrpc:"2.0", method, params: (credentials && method!=='Authenticate') ? { ...params, credentials } : params };
  const r = await fetch(`https://${serverUsed}/apiv1`, { method:'POST', headers:{'Content-Type':'application/json','Accept':'application/json'}, body: JSON.stringify(rpc) });
  if(!r.ok) throw new Error('HTTP '+r.status);
  const j = await r.json();
  if(j.error){ throw new Error((j.error.data && j.error.data.exceptionMessage) || j.error.message || j.error.name); }
  return j.result!==undefined ? j.result : j;
}

document.getElementById('authBtn').onclick = async function(){
  const server = document.getElementById('server').value.trim();
  const database = document.getElementById('database').value.trim();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if(!server||!database||!username||!password){ msg('authResult','Fill all fields','warning'); return; }
  try{
    serverUsed = server;
    const r = await callGeotabAPI('Authenticate',{ userName:username, password, database });
    if(r.path && r.path!=='ThisServer'){
      serverUsed = r.path;
      const r2 = await callGeotabAPI('Authenticate',{ userName:username, password, database });
      credentials = r2.credentials;
    } else {
      credentials = r.credentials;
    }
    msg('authResult',`✅ Authenticated on ${serverUsed} / DB: ${database}`,'success');
    document.getElementById('reportCard').style.display='block';
  }catch(e){ msg('authResult','Auth failed: '+e.message,'danger'); }
};

document.getElementById('useSession').onclick = function(){
  if (window.geotab && typeof window.geotab.call==='function'){
    credentials = { sessionId:'', database:'' };
    serverUsed = location.host;
    msg('authResult','✅ Using MyGeotab session','success');
    document.getElementById('reportCard').style.display='block';
  } else {
    msg('authResult','Not running inside MyGeotab. Use manual auth.','warning');
  }
};

document.getElementById('logout').onclick = function(){
  credentials=null; serverUsed=null;
  document.getElementById('reportCard').style.display='none';
  document.getElementById('authResult').innerHTML='';
  document.getElementById('banner').innerHTML='';
  document.getElementById('tableWrap').innerHTML='';
};

function computeDelta(odo, fuel){
  let dist=0, liters=0, hasFuel=false;
  if(odo && odo.length>1){ dist = (odo[odo.length-1].data - odo[0].data) / 1000; }
  if(fuel && fuel.length>1){ liters = (fuel[fuel.length-1].data - fuel[0].data); hasFuel=true; }
  if(liters<0) liters = 0;
  return { distanceKm: dist>0?dist:0, liters: liters>0?liters:0, hasFuel };
}

async function fetchForDevices(devices, fromISO, toISO, resultsLimit=1000, concurrency=8, timeoutSec=45){
  const rows=[];
  let done=0, total=devices.length;
  cancelFlag=false;
  document.getElementById('cancelBtn').disabled=false;

  const chunks=[];
  for(let i=0;i<devices.length;i+=concurrency){
    chunks.push(devices.slice(i, i+concurrency));
  }

  for(const chunk of chunks){
    if(cancelFlag) break;

    // Build multiCall batch if available
    if (window.geotab && typeof window.geotab.multiCall==='function'){
      const calls=[];
      for(const d of chunk){
        const id=d.id;
        calls.push(["Get",{ typeName:"StatusData", search:{ fromDate:fromISO, toDate:toISO, diagnosticSearch:{ id:"DiagnosticOdometerAdjustmentId" }, deviceSearch:{ id }, }, resultsLimit }]);
        calls.push(["Get",{ typeName:"StatusData", search:{ fromDate:fromISO, toDate:toISO, diagnosticSearch:{ id:"DiagnosticDeviceTotalFuelId" }, deviceSearch:{ id }, }, resultsLimit }]);
      }
      const res = await Promise.race([
        new Promise((resolve,reject)=>window.geotab.multiCall(calls, resolve, reject)),
        new Promise((_,reject)=>setTimeout(()=>reject(new Error('Batch timeout')), timeoutSec*1000))
      ]);
      // Pair results for each device
      for(let i=0;i<chunk.length;i++){
        const d=chunk[i];
        const odo = res[2*i] || [];
        const fuel = res[2*i+1] || [];
        const { distanceKm, liters, hasFuel } = computeDelta(odo, fuel);
        const est = !hasFuel;
        const fuelLit = est ? (distanceKm>0 ? (distanceKm/100)*25 : 8*15) : liters;
        const co2 = Math.round(fuelLit*2.68*100)/100;
        rows.push({ deviceName:d.name||d.id, distanceKm:Math.round(distanceKm*10)/10, liters:Math.round(fuelLit*10)/10, fuelSource: est?'Estimated':'Actual', estimated: est, co2 });
        done++; setProgress(done,total,`Processed ${done}/${total}`);
      }
    } else {
      // Standalone: parallel per-device with Promise.allSettled and timeout
      const ps = chunk.map(async d=>{
        const id=d.id;
        const odoP = callGeotabAPI("Get",{ typeName:"StatusData", search:{ fromDate:fromISO, toDate:toISO, diagnosticSearch:{ id:"DiagnosticOdometerAdjustmentId" }, deviceSearch:{ id } }, resultsLimit });
        const fuelP= callGeotabAPI("Get",{ typeName:"StatusData", search:{ fromDate:fromISO, toDate:toISO, diagnosticSearch:{ id:"DiagnosticDeviceTotalFuelId" }, deviceSearch:{ id } }, resultsLimit });
        const res = await Promise.race([Promise.all([odoP,fuelP]), new Promise((_,reject)=>setTimeout(()=>reject(new Error('Batch timeout')), timeoutSec*1000))]);
        const { distanceKm, liters, hasFuel } = computeDelta(res[0], res[1]);
        const est = !hasFuel;
        const fuelLit = est ? (distanceKm>0 ? (distanceKm/100)*25 : 8*15) : liters;
        const co2 = Math.round(fuelLit*2.68*100)/100;
        rows.push({ deviceName:d.name||d.id, distanceKm:Math.round(distanceKm*10)/10, liters:Math.round(fuelLit*10)/10, fuelSource: est?'Estimated':'Actual', estimated: est, co2 });
        done++; setProgress(done,total,`Processed ${done}/${total}`);
      });
      await Promise.allSettled(ps);
    }
  }

  document.getElementById('cancelBtn').disabled=true;
  return rows;
}

document.getElementById('cancelBtn').onclick = function(){ cancelFlag=true; msg('banner','Cancelling after current batch…','warning'); };

document.getElementById('runBtn').onclick = async function(){
  try{
    msg('banner','Running…','info');
    setProgress(0,1,'Starting…');
    const fromISO = new Date(document.getElementById('fromDate').value+'T00:00:00.000Z').toISOString();
    const toISO = new Date(document.getElementById('toDate').value+'T23:59:59.999Z').toISOString();
    const limit = parseInt(document.getElementById('limit').value)||300;
    const resultsLimit = parseInt(document.getElementById('resultsLimit').value)||1000;
    const concurrency = parseInt(document.getElementById('concurrency').value)||8;
    const timeoutSec = parseInt(document.getElementById('timeoutSec').value)||45;

    const devices = await callGeotabAPI('Get',{ typeName:'Device', resultsLimit:limit });
    setProgress(0, devices.length, 'Processing devices…');

    const rows = await fetchForDevices(devices, fromISO, toISO, resultsLimit, concurrency, timeoutSec);
    rows.sort((a,b)=> b.liters-a.liters);
    renderTable(rows);
    renderCharts(rows, fromISO, toISO);
    renderLegend();
    const act = rows.filter(r=>r.fuelSource==='Actual').length;
    const est = rows.filter(r=>r.fuelSource==='Estimated').length;
    msg('banner',`✅ Done — Fuel coverage: Actual ${act} | Estimated ${est}`,'success');
  }catch(e){
    msg('banner','Failed: '+e.message,'danger');
  }
};

function renderTable(rows){
  const wrap = document.getElementById('tableWrap');
  if(!rows.length){ wrap.innerHTML = '<div class="alert alert-warning">No data</div>'; return; }
  let html = `<table class="table"><thead><tr>
    <th>Asset</th><th>Distance (km)</th><th>Fuel (L)</th><th>Fuel Source</th><th>CO₂ (kg)</th>
  </tr></thead><tbody>`;
  rows.forEach(r=>{
    const rowCls = r.estimated ? ' class="row-estimated"' : '';
    const badge = r.estimated ? '<span class="badge b-est">Estimated</span>' : '<span class="badge b-act">Actual</span>';
    html += `<tr${rowCls}>
      <td>${r.deviceName}</td>
      <td>${r.distanceKm}</td>
      <td>${r.liters}</td>
      <td>${badge}</td>
      <td>${r.co2}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

let _co2BarChart = null;
let _co2PieChart = null;

function renderCharts(rows, fromISO, toISO){
  if(!rows || !rows.length){ 
    document.getElementById('chartsCard').style.display='none';
    return;
  }
  // Sort by CO2 desc
  const sorted = [...rows].sort((a,b)=> b.co2 - a.co2);
  const labels = sorted.map(r=>r.deviceName);
  const data = sorted.map(r=>r.co2);

  const hi = sorted[0];
  const lo = sorted[sorted.length-1];
  const dateLabel = new Date(fromISO).toISOString().slice(0,10) + " → " + new Date(toISO).toISOString().slice(0,10);
  document.getElementById('chartsSubtitle').textContent = `Highest: ${hi.deviceName} (${hi.co2} kg) • Lowest: ${lo.deviceName} (${lo.co2} kg) • Range: ${dateLabel}`;

  // Colors: highlight highest (first) and lowest (last)
  const base = Array(data.length).fill('#60a5fa');
  if(data.length>0) base[0] = '#ef4444';
  if(data.length>1) base[data.length-1] = '#22c55e';

  const barCtx = document.getElementById('co2Bar').getContext('2d');
  if(_co2BarChart) _co2BarChart.destroy();
  _co2BarChart = new Chart(barCtx, {
    type: 'bar',
    data: { labels, datasets: [{ label: 'CO₂ (kg)', data, backgroundColor: base }] },
    options: { responsive:true, plugins:{ legend:{ display:true } }, scales:{ y:{ beginAtZero:true } } }
  });

  // Pie (share)
  const pieCtx = document.getElementById('co2Pie').getContext('2d');
  if(_co2PieChart) _co2PieChart.destroy();
  _co2PieChart = new Chart(pieCtx, {
    type: 'doughnut',
    data: { labels, datasets: [{ label: 'Share of CO₂', data }] },
    options: { responsive:true, plugins:{ legend:{ display:true, position:'right' } } }
  });

  document.getElementById('chartsCard').style.display='block';
}

function renderLegend(){
  const el = document.getElementById('legendText');
  el.innerHTML = `
    <ul style="margin-left:16px;">
      <li><strong>Distance (km)</strong> = Δ of <code>DiagnosticOdometerAdjustmentId</code> between selected From → To.</li>
      <li><strong>Fuel (L)</strong> = Δ of <code>DiagnosticDeviceTotalFuelId</code> over the same window.</li>
      <li><strong>CO₂ (kg)</strong> = Fuel (L) × 2.68 (diesel emission factor).</li>
      <li><strong>Actual vs Estimated</strong>:
        <ul style="margin-left:16px;">
          <li><span class="badge b-act">Actual</span> when fuel delta is available.</li>
          <li><span class="badge b-est">Estimated</span> only when no fuel points exist in the window:
            <ul style="margin-left:16px;">
              <li>If distance exists: 25 L/100km fallback</li>
              <li>If no distance: 15 L/hour conservative estimate (assumed limited operation)</li>
            </ul>
          </li>
        </ul>
      </li>
      <li><strong>Window</strong> = exactly the dates you picked in the browser tool.</li>
    </ul>
  `;
  document.getElementById('legendCard').style.display='block';
}

</script>
</body>
