function logPerformance(message) {
  const elapsed = Date.now() - performanceStart;
  console.log(`[${elapsed}ms] ${message}`);
  const stats = document.getElementById('performanceStats');
  if (stats) {
    stats.innerHTML += `<div>[${elapsed}ms] ${message}</div>`;

}

function clearPerformanceStats() {
  const stats = document.getElementById('performanceStats');
  if (stats) {
    stats.innerHTML = '';
    stats.style.display = 'none';
  }
  performanceStart = Date.now();

// ===== STORAGE HELPERS =====
function saveCredentials(server, database, username, password) {
  if (!document.getElementById('rememberAuth').checked) return;
  const creds = { server, database, username, password: btoa(password) };
  localStorage.setItem('geotab_creds', JSON.stringify(creds));
}

function loadCredentials() {
  const saved = localStorage.getItem('geotab_creds');
  if (!saved) return null;
  try {
    const creds = JSON.parse(saved);
    return { ...creds, password: atob(creds.password) };
  } catch (e) {
    localStorage.removeItem('geotab_creds');
    return null;
  }
}

function clearCredentials() {
  localStorage.removeItem('geotab_creds');
}

// ===== AUTH CORE (optimized) =====
let credentials = null; let apiUrl = null;
const $ = (id) => document.getElementById(id);
const EMISSION_FACTOR = 2.68;

function msg(id, text) { 
  const el = $(id); 
  if (el) el.textContent = text; 
}

function toApiUrl(hostOrPath) {
  const s = (hostOrPath || '').trim();
  if (!s) return '';
  if (/^https?:\/\//i.test(s)) return s.endsWith('/apiv1') ? s : s.replace(/\/+$/, '') + '/apiv1';
  return 'https://' + s.replace(/\/+$/, '') + '/apiv1';
}

// Enhanced API call with caching and retry logic
async function callGeotabAPI(method, params = {}, useCache = true) {
  if (!apiUrl) throw new Error('Not authenticated');
  
  const cacheKey = `${method}_${JSON.stringify(params)}`;
  if (useCache && apiCache.has(cacheKey)) {
    return apiCache.get(cacheKey);
  }
  
  const p = credentials ? { ...params, credentials } : params;
  apiCallCount++;
  
  let retries = 2;
  while (retries >= 0) {
    try {
      const res = await fetch(apiUrl, {
        method: 'POST', 
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ method, params: p })
      });
      
      const json = await res.json();
      if (json.error) throw new Error(json.error.message || 'API Error');
      
      const result = (json.result !== undefined) ? json.result : json;
      
      if (useCache && method === 'Get') {
        apiCache.set(cacheKey, result);
        setTimeout(() => apiCache.delete(cacheKey), 300000); // Cache for 5 minutes
      }
      
      return result;
    } catch (err) {
      if (retries === 0) throw err;
      retries--;
      await new Promise(resolve => setTimeout(resolve, 1000)); // Wait 1s before retry
    }
  }
}

// Batch API calls for better performance
async function batchApiCalls(calls, maxConcurrent = 5) {
  const results = [];
  const batches = [];
  
  for (let i = 0; i < calls.length; i += maxConcurrent) {
    batches.push(calls.slice(i, i + maxConcurrent));
  }
  
  for (const batch of batches) {
    const batchPromises = batch.map(call => 
      callGeotabAPI(call.method, call.params).catch(err => ({ error: err.message }))
    );
    const batchResults = await Promise.all(batchPromises);
    results.push(...batchResults);
  }
  
  return results;
}

document.getElementById('authBtn').onclick = async () => {
  const server = $('server')?.value.trim();
  const database = $('database')?.value.trim();

  if (!server || !database || !username || !password) { 
    msg('authResult', 'Please fill all authentication fields.'); 
    return;

  try {
    clearPerformanceStats();
    apiUrl = toApiUrl(server); 
    msg('authResult', 'Authenticating...');
    logPerformance('Starting authentication');
    
    const auth = await callGeotabAPI('Authenticate', { 
      userName: username, 
      password, 
      database 
    }, false);
    
    credentials = auth.credentials; 
    if (!credentials) throw new Error('No credentials returned');
    
    saveCredentials(server, database, username, password);
    logPerformance('Authentication completed');
    
    msg('authResult', 'Connected. You can now run analysis.');

      logPerformance('Connection test completed');
    }
  } catch (err) { 
    msg('authResult', 'Auth failed: ' + (err && err.message ? err.message : err)); 
    credentials = null; 
    $('runBtn').disabled = true;
  }
};

// ===== Math helpers (optimized) =====
function toDate(obj) { 
  const s = obj && (obj.dateTime || obj.time || obj.date || obj.Timestamp || obj.timestamp); 
  return s ? new Date(s) : null; 
}

function getDistanceKm(lat1, lon1, lat2, lon2) { 
  const R = 6371; 
  const dLat = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180; 
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2; 
  return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)); 
}

function haversineKm(aLat, aLon, bLat, bLon) { 
  if (aLat == null || aLon == null || bLat == null || bLon == null) return 0; 
  const R = 6371; 
  const dLat = (bLat - aLat) * Math.PI / 180, dLon = (bLon - aLon) * Math.PI / 180; 
  const la1 = aLat * Math.PI / 180, la2 = bLat * Math.PI / 180; 
  const h = Math.sin(dLat / 2) ** 2 + Math.cos(la1) * Math.cos(la2) * Math.sin(dLon / 2) ** 2; 
  return 2 * R * Math.asin(Math.sqrt(h)); 
}

function computeDeltaFromSeriesByDeltas(series) { 
  if (!series || !series.length) return 0; 
  const readVal = s => (s.TotalFuelUsed ?? s.totalFuelUsed ?? s.data ?? 0); 
  const timeKey = s => (s.dateTime || s.time || s.date || ""); 
  const sorted = [...series].sort((a, b) => String(timeKey(a)).localeCompare(String(timeKey(b)))); 
  let total = 0; 
  for (let i = 1; i < sorted.length; i++) { 
    const d = readVal(sorted[i]) - readVal(sorted[i - 1]); 
    if (isFinite(d) && d > 0) total += d; 
  } 
  const raw = Math.max(...sorted.map(readVal)) - Math.min(...sorted.map(readVal)); 
  return total > 0 ? total : Math.max(0, raw); 
}

// ===== Optimized data fetchers =====
async function fetchTripsForDeviceInChunks(deviceId, fromISO, toISO, daysPerChunk = 7, perChunkLimit = 20000) {
  const start = new Date(fromISO), end = new Date(toISO); 
  const chunks = [];
  let chunkStart = new Date(start);
  
  // Prepare all chunks
  while (chunkStart < end) { 
    const chunkEnd = new Date(Math.min(end.getTime(), chunkStart.getTime() + daysPerChunk * 24 * 3600 * 1000));
    chunks.push({
      method: 'Get',
      params: { 
        typeName: 'Trip', 
        search: { 
          fromDate: chunkStart.toISOString(), 
          toDate: chunkEnd.toISOString(), 
          deviceSearch: { id: deviceId } 
        }, 
        resultsLimit: perChunkLimit 
      }
    });
    chunkStart = new Date(chunkEnd.getTime() + 1);
  }
  
  // Execute all chunks in parallel (optimized by default)
  if (chunks.length > 1) {
    const results = await batchApiCalls(chunks, 5); // Default 5 concurrent
    return results.filter(r => !r.error && Array.isArray(r)).flat();
  } else {
    // Original sequential approach
    const out = [];
    for (const chunk of chunks) {
      const res = await callGeotabAPI(chunk.method, chunk.params);
      if (Array.isArray(res) && res.length) out.push(...res);
    }
    return out;
  }
}

async function fetchGPSForDeviceInChunks(deviceId, fromISO, toISO, hoursPerChunk = 24, perChunkLimit = 10000) {
  const start = new Date(fromISO), end = new Date(toISO); 
  const chunks = [];
  let chunkStart = new Date(start);
  
  while (chunkStart < end) { 
    const chunkEnd = new Date(Math.min(end.getTime(), chunkStart.getTime() + hoursPerChunk * 3600 * 1000));
    chunks.push({
      method: 'Get',
      params: { 
        typeName: 'LogRecord', 
        search: { 
          fromDate: chunkStart.toISOString(), 
          toDate: chunkEnd.toISOString(), 
          deviceSearch: { id: deviceId } 
        }, 
        resultsLimit: perChunkLimit 
      }
    });
    chunkStart = new Date(chunkEnd.getTime() + 1);
  }
  
  if (chunks.length > 1) {
    const results = await batchApiCalls(chunks, 5); // Default 5 concurrent
    return results.filter(r => !r.error && Array.isArray(r)).flat();
  } else {
    const out = [];
    for (const chunk of chunks) {
      const res = await callGeotabAPI(chunk.method, chunk.params);
      if (Array.isArray(res) && res.length) out.push(...res);
    }
    return out;
  }
}

// ===== Zone & fuel helpers =====
function computeDistancesFromGPS(records, zone) {
  if (!records || !records.length) return { totalKm: 0, zoneKm: 0, zonePoints: 0 };
  
  const pts = records.map(r => { 
    const lat = r.latitude ?? r.y, lon = r.longitude ?? r.x, t = toDate(r) || new Date(r.received || 0); 
    return { lat, lon, t }; 
  }).filter(p => p.lat != null && p.lon != null && p.t != null).sort((a, b) => a.t - b.t);
  
  let totalKm = 0, zoneKm = 0, zonePoints = 0;
  
  for (let i = 1; i < pts.length; i++) { 
    const a = pts[i - 1], b = pts[i]; 
    const seg = haversineKm(a.lat, a.lon, b.lat, b.lon); 
    if (!isFinite(seg) || seg < 0) continue; 
    if (seg > 10) continue; 
    totalKm += seg;
    
    const inA = getDistanceKm(a.lat, a.lon, zone.lat, zone.lon) <= 5.0; 
    const inB = getDistanceKm(b.lat, b.lon, zone.lat, zone.lon) <= 5.0; 
    if (inA && inB) zoneKm += seg; 
  }
  
  for (const p of pts) { 
    if (getDistanceKm(p.lat, p.lon, zone.lat, zone.lon) <= 5.0) zonePoints++; 
  }
  
  return { totalKm, zoneKm, zonePoints };
}

async function getFuelUsedForDevice(deviceId, fromISO, toISO) {
  const calls = [
    {
      method: 'Get',
      params: {
        typeName: 'FuelUsed', 
        search: { fromDate: fromISO, toDate: toISO, deviceSearch: { id: deviceId } }, 
        resultsLimit: 10000
      }
    },
    {
      method: 'Get',
      params: {
        typeName: 'StatusData', 
        search: { 
          fromDate: fromISO, 
          toDate: toISO, 
          diagnosticSearch: { id: 'DiagnosticDeviceTotalFuelId' }, 
          deviceSearch: { id: deviceId } 
        }, 
        resultsLimit: 5000
      }
    }
  ];
  
  try {
    // Use batch API calls by default for better performance
    const [fuelEvents, statusData] = await batchApiCalls(calls, 2);
      
    if (!fuelEvents.error && fuelEvents && fuelEvents.length) { 
      const liters = computeDeltaFromSeriesByDeltas(fuelEvents); 
      if (liters > 0) return { liters, source: 'FuelUsed API', estimated: false }; 
    }
    
    if (!statusData.error && statusData && statusData.length) { 
      const liters = computeDeltaFromSeriesByDeltas(statusData); 
      if (liters > 0) return { liters, source: 'StatusData API', estimated: false }; 
    }
  } catch (e) {}
  
  return { liters: 0, source: 'None', estimated: true };
}

function getLat(obj) { return obj && (obj.latitude ?? obj.y ?? obj.lat ?? null); }
function getLon(obj) { return obj && (obj.longitude ?? obj.x ?? obj.lon ?? null); }

function tripTouchesZone(trip, zone) {
  const sLat = getLat(trip.startLocation || trip.startPoint || trip.startPosition || trip.startGeo);
  const sLon = getLon(trip.startLocation || trip.startPoint || trip.startPosition || trip.startGeo);
  const eLat = getLat(trip.stopLocation || trip.stopPoint || trip.stopPosition || trip.stopGeo);
  const eLon = getLon(trip.stopLocation || trip.stopPoint || trip.stopPosition || trip.stopGeo);
  
  const inS = (sLat != null && sLon != null) ? (getDistanceKm(sLat, sLon, zone.lat, zone.lon) <= 5.0) : false;
  const inE = (eLat != null && eLon != null) ? (getDistanceKm(eLat, eLon, zone.lat, zone.lon) <= 5.0) : false;
  
  return inS || inE;
}

function resultsToCSV(rows) {
  const headers = ["Vehicle", "Zone Distance (km)", "Zone Fuel (L)", "Zone CO2 (kg)", "Zone Trips", "Total Distance (km)", "Total Fuel (L)", "Data Source", "Zone Name"];
  const lines = [headers.join(",")];
  
  rows.forEach(r => { 
    const arr = [r.deviceName, r.zoneDistanceKm, r.zoneLiters, r.co2, r.zoneTrips, r.totalDistanceKm, r.totalLiters, (r.estimated ? 'Estimated - ' : 'Real - ') + r.fuelSource, r.zoneName]; 
    lines.push(arr.map(v => {
      const s = (v == null) ? '' : String(v); 
      return /[",\n]/.test(s) ? ('"' + s.replace(/"/g, '""') + '"') : s;
    }).join(",")); 
  });
  
  return lines.join("\n");
}

function downloadCSV(filename, text) { 
  const blob = new Blob([text], { type: "text/csv;charset=utf-8;" }); 
  const url = URL.createObjectURL(blob); 
  const a = document.createElement("a"); 
  a.href = url; 
  a.download = filename; 
  document.body.appendChild(a); 
  a.click(); 
  document.body.removeChild(a); 
  URL.revokeObjectURL(url); 
}

document.getElementById('downloadBtn').onclick = function() { 
  if (!__lastResults || !__lastResults.length) { 
    alert("No report to download yet. Run analysis first."); 
    return; 
  } 
  const csv = resultsToCSV(__lastResults); 
  const now = new Date().toISOString().split("T")[0]; 
  downloadCSV("zone_emissions_report_" + now + ".csv", csv); 
};

// ===== OPTIMIZED RUN FUNCTIONS =====
async function processDevicesInParallel(devices, selectedZone, fromISO, toISO, skipGPS = false) {
  const results = [];
  const batchSize = 20; // Default optimized batch size
  const maxConcurrent = 5; // Default concurrent processing
  
  logPerformance(`Processing ${devices.length} devices in batches of ${batchSize}`);
  
  for (let i = 0; i < devices.length; i += batchSize) {
    const batch = devices.slice(i, i + batchSize);
    const batchPromises = [];
    
    for (let j = 0; j < batch.length; j += maxConcurrent) {
      const subBatch = batch.slice(j, j + maxConcurrent);
      const subBatchPromise = Promise.all(
        subBatch.map(device => processDevice(device, selectedZone, fromISO, toISO, skipGPS))
      );
      batchPromises.push(subBatchPromise);
    }
    
    const batchResults = await Promise.all(batchPromises);
    const flatResults = batchResults.flat().filter(r => r !== null);
    results.push(...flatResults);
    
    setProgress(40 + (i / devices.length) * 50, 100, `Processed ${i + batch.length}/${devices.length} devices`);
    logPerformance(`Completed batch ${Math.floor(i / batchSize) + 1}/${Math.ceil(devices.length / batchSize)}`);
  }
  
  return results;
}

async function processDevice(device, selectedZone, fromISO, toISO, skipGPS = false) {
  const deviceId = device.id;
  
  try {
    // Get trips
    const trips = await fetchTripsForDeviceInChunks(deviceId, fromISO, toISO, 7, 20000);
    const totalDistanceKmFromTrips = Math.round(trips.reduce((s, t) => s + ((t.distance || 0) / 1000), 0) * 10) / 10;
    const zoneTripCount = trips.filter(t => tripTouchesZone(t, selectedZone)).length;
    
    if (zoneTripCount === 0) return null; // No zone involvement
    
    let zoneDistanceKm = 0;
    let totalDistanceKm = totalDistanceKmFromTrips;
    
    if (!skipGPS) {
      // GPS analysis for precise in-zone distance
      const deviceGPS = await fetchGPSForDeviceInChunks(deviceId, fromISO, toISO, 24, 10000);
      const dist = computeDistancesFromGPS(deviceGPS, selectedZone);
      totalDistanceKm = totalDistanceKmFromTrips > 0 ? totalDistanceKmFromTrips : Math.round(dist.totalKm * 10) / 10;
      zoneDistanceKm = Math.round(dist.zoneKm * 10) / 10;
    } else {
      // Estimate zone distance from trip data
      const zoneTrips = trips.filter(t => tripTouchesZone(t, selectedZone));
      zoneDistanceKm = Math.round(zoneTrips.reduce((s, t) => s + ((t.distance || 0) / 1000), 0) * 10) / 10;
    }
    
    if (zoneDistanceKm <= 0) return null;
    
    // Get fuel data
    const fuelData = await getFuelUsedForDevice(deviceId, fromISO, toISO);
    let liters = fuelData.liters;
    let fuelSource = fuelData.source;
    let estimated = fuelData.estimated;
    
    if (liters <= 0) {
      estimated = true;
      liters = totalDistanceKm > 5 ? (totalDistanceKm / 100) * 25 : 60;
      fuelSource = totalDistanceKm > 5 ? 'Estimated (25L/100km from distance)' : 'Estimated (60L default)';
    }
    
    const zoneFuelRatio = totalDistanceKm > 0 ? (zoneDistanceKm / totalDistanceKm) : 0;
    const zoneFuel = liters * zoneFuelRatio;
    const co2 = Math.round(zoneFuel * EMISSION_FACTOR * 100) / 100;
    
    return {
      deviceId,
      deviceName: device.name || deviceId,
      totalLiters: Math.round(liters * 10) / 10,
      zoneLiters: Math.round(zoneFuel * 10) / 10,
      co2,
      fuelSource,
      estimated,
      zoneTrips: zoneTripCount,
      totalTrips: trips.length,
      totalDistanceKm: Math.round(totalDistanceKm * 10) / 10,
      zoneDistanceKm: zoneDistanceKm,
      zoneName: selectedZone.name
    };
  } catch (error) {
    console.error(`Error processing device ${deviceId}:`, error);
    return null;
  }
}

// Main run function
document.getElementById('runBtn').onclick = async function() {
  await runAnalysis();
};

async function runAnalysis() {
  try {
    clearPerformanceStats();
    
    const selectedZoneId = $('zoneSelect').value;
    if (!selectedZoneId) {
      msg('banner', 'Please select a zone first.');
      return;
    }
    
    const selectedZone = HARDCODED_ZONES.find(z => z.id === selectedZoneId);
    const skipGPS = $('fastMode').checked; // Use fast mode setting
    const mode = skipGPS ? 'Fast Mode (Trip-based)' : 'Full Mode (GPS + Trips)';
    msg('banner', `Analyzing ${selectedZone.name} - ${mode}...`);
    setProgress(0, 100, 'Start');
    logPerformance('Analysis started - ' + mode);
    
    const fromISO = new Date(($('fromDate').value || '') + 'T00:00:00.000Z').toISOString();
    const toISO = new Date(($('toDate').value || '') + 'T23:59:59.999Z').toISOString();
    const limit = parseInt($('limit').value) || 100;
    
    // Get devices
    logPerformance('Fetching devices');
    const devices = await callGeotabAPI('Get', { typeName: 'Device', resultsLimit: limit });
    setProgress(20, 100, 'Got ' + devices.length + ' devices');
    logPerformance(`Retrieved ${devices.length} devices`);
    
    let results = [];
    
    // Always use parallel processing for better performance
    results = await processDevicesInParallel(devices, selectedZone, fromISO, toISO, skipGPS);
    
    results.sort((a, b) => b.co2 - a.co2);
    
    setProgress(95, 100, 'Rendering...');
    logPerformance('Rendering results');
    
    renderZoneTable(results, selectedZone);
    renderZoneSummary(results, selectedZone);
    renderLegend();
    
    const totalCO2 = results.reduce((sum, r) => sum + r.co2, 0);
    const actualCount = results.filter(r => !r.estimated).length;
    const finalMessage = (results.length === 0) 
      ? (`No vehicles found visiting ${selectedZone.name}. Try expanding date range.`)
      : (`${selectedZone.name}: ${results.length} vehicles. ${actualCount} real fuel readings. Zone CO₂: ${Math.round(totalCO2)} kg`);
    
    msg('banner', finalMessage + ` | API calls: ${apiCallCount} | Mode: ${mode}`);
    setProgress(100, 100, 'Done');
    logPerformance(`Analysis completed. Found ${results.length} vehicles with zone activity`);
    
  } catch (e) {
    msg('banner', 'Zone analysis failed: ' + (e.message || e));
    logPerformance('Analysis failed: ' + (e.message || e));
    console.error(e);
  }
}
