<script>
// ===== PERFORMANCE & CACHING =====
let performanceStart = 0;
let apiCallCount = 0;
const apiCache = new Map();

function logPerformance(message) {
  const elapsed = Date.now() - performanceStart;
  console.log(`[${elapsed}ms] ${message}`);
}

function clearPerformanceStats() {
  performanceStart = Date.now();
  apiCallCount = 0;
}

// ===== AUTH CORE =====
let credentials = null; 
let apiUrl = null;
const $ = (id) => document.getElementById(id);
const EMISSION_FACTOR = 2.68; // kg CO2 per liter of fuel

function msg(id, text) { 
  const el = $(id); 
  if (el) el.textContent = text; 
}

function toApiUrl(hostOrPath) {
  const s = (hostOrPath || '').trim();
  if (!s) return '';
  if (/^https?:\/\//i.test(s)) return s.endsWith('/apiv1') ? s : s.replace(/\/+$/, '') + '/apiv1';
  return 'https://' + s.replace(/\/+$/, '') + '/apiv1';
}

async function callGeotabAPI(method, params = {}, useCache = true) {
  if (!apiUrl) throw new Error('Not authenticated');
  
  const cacheKey = `${method}_${JSON.stringify(params)}`;
  if (useCache && apiCache.has(cacheKey)) {
    return apiCache.get(cacheKey);
  }
  
  const p = credentials ? { ...params, credentials } : params;
  apiCallCount++;
  
  let retries = 2;
  while (retries >= 0) {
    try {
      const res = await fetch(apiUrl, {
        method: 'POST', 
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ method, params: p })
      });
      
      const json = await res.json();
      if (json.error) throw new Error(json.error.message || 'API Error');
      
      const result = (json.result !== undefined) ? json.result : json;
      
      if (useCache && method === 'Get') {
        apiCache.set(cacheKey, result);
        setTimeout(() => apiCache.delete(cacheKey), 300000); // Cache for 5 minutes
      }
      
      return result;
    } catch (err) {
      if (retries === 0) throw err;
      retries--;
      await new Promise(resolve => setTimeout(resolve, 1000));
    }
  }
}

async function batchApiCalls(calls, maxConcurrent = 5) {
  const results = [];
  const batches = [];
  
  for (let i = 0; i < calls.length; i += maxConcurrent) {
    batches.push(calls.slice(i, i + maxConcurrent));
  }
  
  for (const batch of batches) {
    const batchPromises = batch.map(call => 
      callGeotabAPI(call.method, call.params).catch(err => ({ error: err.message }))
    );
    const batchResults = await Promise.all(batchPromises);
    results.push(...batchResults);
  }
  
  return results;
}

const HARDCODED = {

// ===== UI HELPERS =====
function setProgress(done, total, label) { 
  const p = total ? Math.round(done / total * 100) : 0; 
  const f = $('progressFill'); 
  if (f) { 
    f.style.width = p + '%'; 
    f.textContent = label || p + '%'; 
  } 
}

// Set default dates
(function setDateDefaults() { 
  const t = new Date(); 
  const l = new Date(t.getTime() - 7 * 24 * 3600 * 1000); // Last 7 days
  $('toDate').value = t.toISOString().split('T')[0];

// Auto-login on page load
window.addEventListener('load', () => {
  const btn = document.getElementById('authBtn');
  if (btn) btn.click();
});

// ===== IDLING ANALYSIS FUNCTIONS =====
function isBusinessDay(date) {
  const day = date.getDay();
  return day >= 1 && day <= 5; // Monday to Friday
}

function isBusinessHours(date) {
  const hour = date.getHours();
  return hour >= 6 && hour < 18; // 6 AM to 6 PM
}

function calculateSpeed(lat1, lon1, lat2, lon2, timeDiffSeconds) {
  if (timeDiffSeconds <= 0) return 0;
  
  const R = 6371; // Earth radius in km
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
  const distance = 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  
  const speedKmh = (distance / timeDiffSeconds) * 3600;
  return isFinite(speedKmh) ? speedKmh : 0;
}

async function fetchLogRecordsForDevice(deviceId, fromISO, toISO) {
  const hoursPerChunk = 24;
  const start = new Date(fromISO);
  const end = new Date(toISO);
  const chunks = [];
  let chunkStart = new Date(start);
  
  while (chunkStart < end) { 
    const chunkEnd = new Date(Math.min(end.getTime(), chunkStart.getTime() + hoursPerChunk * 3600 * 1000));
    chunks.push({
      method: 'Get',
      params: { 
        typeName: 'LogRecord', 
        search: { 
          fromDate: chunkStart.toISOString(), 
          toDate: chunkEnd.toISOString(), 
          deviceSearch: { id: deviceId } 
        }, 
        resultsLimit: 10000 
      }
    });
    chunkStart = new Date(chunkEnd.getTime() + 1);
  }
  
  const out = [];
  for (const chunk of chunks) {
    const res = await callGeotabAPI(chunk.method, chunk.params);
    if (Array.isArray(res) && res.length) out.push(...res);
  }
  
  return out;
}

function analyzeIdlingFromLogRecords(logRecords, settings) {
  if (!logRecords || !logRecords.length) return { idlingEvents: [], totalIdlingMinutes: 0, totalIdlingFuel: 0 };
  
  const {
    minIdlingMinutes,
    maxSpeedKmh,
    excludeWeekends,
    businessHoursOnly
  } = settings;
  
  // Sort by time
  const records = logRecords.map(r => ({
    lat: r.latitude ?? r.y,
    lon: r.longitude ?? r.x,
    time: new Date(r.dateTime || r.time || r.date),
    speed: r.speed || 0
  })).filter(r => r.lat != null && r.lon != null && r.time != null)
    .sort((a, b) => a.time - b.time);
  
  if (records.length < 2) return { idlingEvents: [], totalIdlingMinutes: 0, totalIdlingFuel: 0 };
  
  const idlingEvents = [];
  let currentIdlingStart = null;
  let idlingStartRecord = null;
  
  for (let i = 1; i < records.length; i++) {
    const prev = records[i - 1];
    const curr = records[i];
    const timeDiffSeconds = (curr.time - prev.time) / 1000;
    
    if (timeDiffSeconds <= 0 || timeDiffSeconds > 3600) continue; // Skip invalid time gaps
    
    // Filter by day/time if requested
    if (excludeWeekends && !isBusinessDay(curr.time)) continue;
    if (businessHoursOnly && !isBusinessHours(curr.time)) continue;
    
    const calculatedSpeed = calculateSpeed(prev.lat, prev.lon, curr.lat, curr.lon, timeDiffSeconds);
    const actualSpeed = Math.max(curr.speed * 3.6, calculatedSpeed); // Convert m/s to km/h if needed
    
    if (actualSpeed <= maxSpeedKmh) {
      // Vehicle is stationary/slow - potential idling
      if (!currentIdlingStart) {
        currentIdlingStart = prev.time;
        idlingStartRecord = prev;
      }
    } else {
      // Vehicle is moving - end any current idling period
      if (currentIdlingStart) {
        const idlingDurationMinutes = (prev.time - currentIdlingStart) / (1000 * 60);
        if (idlingDurationMinutes >= minIdlingMinutes) {
          idlingEvents.push({
            startTime: currentIdlingStart,
            endTime: prev.time,
            durationMinutes: idlingDurationMinutes,
            location: { lat: idlingStartRecord.lat, lon: idlingStartRecord.lon }
          });
        }
        currentIdlingStart = null;
        idlingStartRecord = null;
      }
    }
  }
  
  // Check if there's an ongoing idling period at the end
  if (currentIdlingStart) {
    const lastRecord = records[records.length - 1];
    const idlingDurationMinutes = (lastRecord.time - currentIdlingStart) / (1000 * 60);
    if (idlingDurationMinutes >= minIdlingMinutes) {
      idlingEvents.push({
        startTime: currentIdlingStart,
        endTime: lastRecord.time,
        durationMinutes: idlingDurationMinutes,
        location: { lat: idlingStartRecord.lat, lon: idlingStartRecord.lon }
      });
    }
  }
  
  const totalIdlingMinutes = idlingEvents.reduce((sum, event) => sum + event.durationMinutes, 0);
  const totalIdlingFuel = (totalIdlingMinutes / 60) * settings.idlingFuelRate;
  
  return { idlingEvents, totalIdlingMinutes, totalIdlingFuel };
}

async function processDeviceForIdling(device, fromISO, toISO, settings) {
  const deviceId = device.id;
  
  try {
    const logRecords = await fetchLogRecordsForDevice(deviceId, fromISO, toISO);
    const analysis = analyzeIdlingFromLogRecords(logRecords, settings);
    
    if (analysis.totalIdlingMinutes <= 0) return null;
    
    const co2Emissions = analysis.totalIdlingFuel * EMISSION_FACTOR;
    const avgIdlingDuration = analysis.idlingEvents.length > 0 ? 
      (analysis.totalIdlingMinutes / analysis.idlingEvents.length) : 0;
    
    return {
      deviceId,
      deviceName: device.name || deviceId,
      idlingEvents: analysis.idlingEvents.length,
      totalIdlingMinutes: Math.round(analysis.totalIdlingMinutes * 10) / 10,
      totalIdlingHours: Math.round(analysis.totalIdlingMinutes / 60 * 10) / 10,
      avgIdlingMinutes: Math.round(avgIdlingDuration * 10) / 10,
      idlingFuelLiters: Math.round(analysis.totalIdlingFuel * 10) / 10,
      co2Emissions: Math.round(co2Emissions * 100) / 100,
      fuelCostEstimate: Math.round(analysis.totalIdlingFuel * 1.50 * 100) / 100, // Assume $1.50/L
      details: analysis.idlingEvents
    };
  } catch (error) {
    console.error(`Error processing device ${deviceId}:`, error);
    return null;
  }
}

async function processDevicesForIdling(devices, fromISO, toISO, settings) {
  const results = [];
  const batchSize = 10;
  
  for (let i = 0; i < devices.length; i += batchSize) {
    const batch = devices.slice(i, i + batchSize);
    const batchPromises = batch.map(device => processDeviceForIdling(device, fromISO, toISO, settings));
    const batchResults = await Promise.all(batchPromises);
    const validResults = batchResults.filter(r => r !== null);
    results.push(...validResults);
    
    setProgress(20 + (i / devices.length) * 70, 100, `Processed ${i + batch.length}/${devices.length} devices`);
    logPerformance(`Completed batch ${Math.floor(i / batchSize) + 1}/${Math.ceil(devices.length / batchSize)}`);
  }
  
  return results;
}

// ===== RENDERING =====
let __lastResults = null;

function renderIdlingTable(results) {
  let s = '<table><thead><tr><th>Vehicle</th><th>Idling Events</th><th>Total Idling (hours)</th><th>Avg Event (min)</th><th>Fuel Wasted (L)</th><th>CO₂ Emissions (kg)</th><th>Est. Cost ($)</th></tr></thead><tbody>';
  results.forEach(r => { 
    s += `<tr>
      <td>${r.deviceName}</td>
      <td>${r.idlingEvents}</td>
      <td>${r.totalIdlingHours}</td>
      <td>${r.avgIdlingMinutes}</td>
      <td>${r.idlingFuelLiters}</td>
      <td>${r.co2Emissions}</td>
      <td>$${r.fuelCostEstimate}</td>
    </tr>`; 
  });
  s += '</tbody></table>'; 
  
  document.getElementById('tableWrap').innerHTML = s; 
  document.getElementById('reportCard').style.display = 'block';
  
  __lastResults = results; 
  document.getElementById('downloadBtn').disabled = !results.length;
}

function renderIdlingSummary(results) {
  const totalIdlingHours = results.reduce((s, r) => s + r.totalIdlingHours, 0);
  const totalFuelWasted = results.reduce((s, r) => s + r.idlingFuelLiters, 0);
  const totalCO2 = results.reduce((s, r) => s + r.co2Emissions, 0);
  const totalCost = results.reduce((s, r) => s + r.fuelCostEstimate, 0);
  const totalEvents = results.reduce((s, r) => s + r.idlingEvents, 0);
  
  const topIdlers = results.slice(0, 5);
  
  let html = '<div class="row">';
  html += `<div>
    <strong>Fleet Summary</strong><br>
    <strong>Vehicles with Idling:</strong> ${results.length}<br>
    <strong>Total Idling Events:</strong> ${totalEvents}<br>
    <strong>Total Idling Time:</strong> ${Math.round(totalIdlingHours)} hours<br>
    <strong>Fuel Wasted:</strong> ${Math.round(totalFuelWasted)} L<br>
    <strong>CO₂ Emissions:</strong> ${Math.round(totalCO2)} kg<br>
    <strong>Estimated Cost:</strong> $${Math.round(totalCost)}
  </div>`;
  
  html += `<div>
    <strong>Top Idling Vehicles</strong>
    <table><thead><tr><th>Vehicle</th><th>Hours</th><th>Cost</th></tr></thead><tbody>`;
  topIdlers.forEach(v => { 
    html += `<tr><td>${v.deviceName}</td><td>${v.totalIdlingHours}</td><td>$${v.fuelCostEstimate}</td></tr>`; 
  });
  html += '</tbody></table></div></div>';
  
  document.getElementById('summaryContent').innerHTML = html; 
  document.getElementById('summaryCard').style.display = 'block';
}

function renderHighIdlingAlerts(results) {
  // Flag vehicles with excessive idling (>2 hours per day or >30 min average events)
  const alerts = results.filter(r => r.totalIdlingHours > 2 || r.avgIdlingMinutes > 30);
  
  if (alerts.length === 0) {
    document.getElementById('alertsContent').innerHTML = '<p>No high idling alerts for this period.</p>';
  } else {
    let html = '<div class="warning">The following vehicles have concerning idling patterns:</div>';
    html += '<table><thead><tr><th>Vehicle</th><th>Issue</th><th>Impact</th></tr></thead><tbody>';
    
    alerts.forEach(r => {
      let issue = '';
      if (r.totalIdlingHours > 2) issue += `High total idling (${r.totalIdlingHours}h). `;
      if (r.avgIdlingMinutes > 30) issue += `Long average events (${r.avgIdlingMinutes} min).`;
      
      html += `<tr>
        <td>${r.deviceName}</td>
        <td>${issue}</td>
        <td>$${r.fuelCostEstimate} cost, ${r.co2Emissions} kg CO₂</td>
      </tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('alertsContent').innerHTML = html;
  }
  
  document.getElementById('alertsCard').style.display = 'block';
}

function renderLegend(settings) {
  const text = `
    <ul>
      <li><strong>Detection Criteria:</strong> Speed ≤ ${settings.maxSpeedKmh} km/h for ≥ ${settings.minIdlingMinutes} minutes</li>
      <li><strong>Fuel Rate:</strong> ${settings.idlingFuelRate} L/hour during idling</li>
      <li><strong>CO₂ Factor:</strong> ${EMISSION_FACTOR} kg per liter of fuel</li>
      <li><strong>Cost Estimate:</strong> Based on $1.50/L fuel price</li>
      <li><strong>Time Filters:</strong> ${settings.excludeWeekends ? 'Weekdays only' : 'All days'}, ${settings.businessHoursOnly ? '6 AM - 6 PM only' : 'All hours'}</li>
    </ul>
  `;
  document.getElementById('legendText').innerHTML = text; 
  document.getElementById('legendCard').style.display = 'block';
}

function resultsToCSV(rows, settings) {
  const headers = [
    "Vehicle", "Idling Events", "Total Idling Hours", "Avg Event Minutes", 
    "Fuel Wasted (L)", "CO2 Emissions (kg)", "Estimated Cost ($)"
  ];
  const lines = [headers.join(",")];
  
  rows.forEach(r => { 
    const arr = [
      r.deviceName, r.idlingEvents, r.totalIdlingHours, r.avgIdlingMinutes,
      r.idlingFuelLiters, r.co2Emissions, r.fuelCostEstimate
    ]; 
    lines.push(arr.map(v => {
      const s = (v == null) ? '' : String(v); 
      return /[",\n]/.test(s) ? ('"' + s.replace(/"/g, '""') + '"') : s;
    }).join(",")); 
  });
  
  return lines.join("\n");
}

function downloadCSV(filename, text) { 
  const blob = new Blob([text], { type: "text/csv;charset=utf-8;" }); 
  const url = URL.createObjectURL(blob); 
  const a = document.createElement("a"); 
  a.href = url; 
  a.download = filename; 
  document.body.appendChild(a); 
  a.click(); 
  document.body.removeChild(a); 
  URL.revokeObjectURL(url); 
}

document.getElementById('downloadBtn').onclick = function() { 
  if (!__lastResults || !__lastResults.length) { 
    alert("No report to download yet. Run analysis first."); 
    return; 
  } 
  const settings = getAnalysisSettings();
  const csv = resultsToCSV(__lastResults, settings); 
  const now = new Date().toISOString().split("T")[0]; 
  downloadCSV("fleet_idling_report_" + now + ".csv", csv); 
};

// ===== MAIN ANALYSIS FUNCTION =====
function getAnalysisSettings() {
  return {
    minIdlingMinutes: parseInt($('minIdlingMinutes').value) || 5,
    maxSpeedKmh: parseFloat($('maxSpeedKmh').value) || 2,
    idlingFuelRate: parseFloat($('idlingFuelRate').value) || 1.5,
    excludeWeekends: $('excludeWeekends').checked,
    businessHoursOnly: $('businessHoursOnly').checked
  };
}

document.getElementById('runBtn').onclick = async function() {
  try {
    clearPerformanceStats();
    
    const settings = getAnalysisSettings();
    msg('banner', 'Analyzing fleet idling patterns...');
    setProgress(0, 100, 'Starting analysis');
    logPerformance('Idling analysis started');
    
    const fromISO = new Date(($('fromDate').value || '') + 'T00:00:00.000Z').toISOString();
    const toISO = new Date(($('toDate').value || '') + 'T23:59:59.999Z').toISOString();
    const limit = parseInt($('limit').value) || 50;
    
    logPerformance('Fetching devices');
    const devices = await callGeotabAPI('Get', { typeName: 'Device', resultsLimit: limit });
    setProgress(10, 100, 'Got ' + devices.length + ' devices');
    logPerformance(`Retrieved ${devices.length} devices`);
    
    const results = await processDevicesForIdling(devices, fromISO, toISO, settings);
    results.sort((a, b) => b.totalIdlingHours - a.totalIdlingHours);
    
    setProgress(95, 100, 'Rendering...');
    logPerformance('Rendering results');
    
    renderIdlingTable(results);
    renderIdlingSummary(results);
    renderHighIdlingAlerts(results);
    renderLegend(settings);
    
    const totalHours = results.reduce((sum, r) => sum + r.totalIdlingHours, 0);
    const totalCost = results.reduce((sum, r) => sum + r.fuelCostEstimate, 0);
    const finalMessage = (results.length === 0) 
      ? 'No significant idling detected in the selected period.'
      : `Analysis complete: ${results.length} vehicles with idling. Total: ${Math.round(totalHours)}h, $${Math.round(totalCost)}`;
    
    msg('banner', finalMessage + ` | API calls: ${apiCallCount}`);
    setProgress(100, 100, 'Done');
    logPerformance(`Analysis completed. Found ${results.length} vehicles with idling activity`);
    
  } catch (e) {
    msg('banner', 'Idling analysis failed: ' + (e.message || e));
    logPerformance('Analysis failed: ' + (e.message || e));
    console.error(e);
  }
};
</script>
