<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geotab DVIR Logs - Simple Mapping</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: #333;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .header h1 {
      color: #2d3748;
      font-size: 2em;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .card-title {
      color: #2d3748;
      font-size: 1.3em;
      font-weight: 700;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e2e8f0;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 15px;
    }

    .form-control {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .form-control:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin: 5px;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .btn-success {
      background: linear-gradient(135deg, #48bb78, #38a169);
      color: white;
    }

    .btn-info {
      background: linear-gradient(135deg, #4299e1, #3182ce);
      color: white;
    }

    .btn-danger {
      background: linear-gradient(135deg, #f56565, #e53e3e);
      color: white;
    }

    .alert {
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
      font-weight: 500;
    }

    .alert-success {
      background: #c6f6d5;
      color: #22543d;
      border-left: 4px solid #38a169;
    }

    .alert-error {
      background: #fed7d7;
      color: #742a2a;
      border-left: 4px solid #e53e3e;
    }

    .alert-warning {
      background: #fefcbf;
      color: #744210;
      border-left: 4px solid #d69e2e;
    }

    .dvir-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .dvir-table th {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 12px;
      text-align: left;
      font-weight: 600;
      font-size: 13px;
    }

    .dvir-table td {
      padding: 10px 12px;
      border-bottom: 1px solid #e2e8f0;
      font-size: 13px;
      vertical-align: top;
    }

    .dvir-table tr:hover {
      background: #f7fafc;
    }

    .dvir-table tr:nth-child(even) {
      background: #f8f9fa;
    }

    .status-safe {
      background: #c6f6d5;
      color: #22543d;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 11px;
    }

    .status-unsafe {
      background: #fed7d7;
      color: #742a2a;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 11px;
    }

    .status-unknown {
      background: #e2e8f0;
      color: #4a5568;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 11px;
    }

    .hidden {
      display: none !important;
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>🚛 Geotab DVIR Logs</h1>
      <p>Driver Vehicle Inspection Reports with Driver & Vehicle Names</p>
    </div>

    <!-- Authentication Section -->
    <div class="card">
      <h3 class="card-title">🔐 Authentication</h3>
      <div class="form-row">
        <input id="server" class="form-control" placeholder="Server" value="my.geotab.com">
        <input id="database" class="form-control" placeholder="Database" value="uccnz">
      </div>
      <div class="form-row">
        <input id="username" class="form-control" placeholder="Username" value="francis@directt.co.nz">
        <input id="password" class="form-control" type="password" placeholder="Password" value="@fr4nc1sWynn5">
      </div>
      <button id="authButton" class="btn btn-primary">🔑 Authenticate</button>
      <div id="authResult"></div>
    </div>

    <!-- DVIR Section -->
    <div id="dvirSection" class="card hidden">
      <h3 class="card-title">📋 DVIR Logs with Names</h3>
      
      <div class="alert alert-success">
        ✅ <strong>Authenticated Successfully!</strong> Ready to get DVIR logs with driver and vehicle names
      </div>

      <div class="form-row">
        <input id="fromDate" class="form-control" type="date" placeholder="From Date">
        <input id="toDate" class="form-control" type="date" placeholder="To Date">
        <input id="resultsLimit" class="form-control" placeholder="Results Limit" value="100">
      </div>
      
      <div>
        <button id="getDvir" class="btn btn-success">📋 Get DVIR Logs</button>
        <button id="downloadCsv" class="btn btn-info">📊 Download CSV</button>
        <button id="logout" class="btn btn-danger">🚪 Logout</button>
      </div>
      
      <div id="dvirResult"></div>
    </div>
  </div>

  <script>
    let credentials = null;
    let serverUsed = null;
    let mappedDvirData = null;

    // Auto-detect if inside Geotab
    window.addEventListener('load', function() {
      if (window.geotab || window.api || window.location.host.includes('geotab.com')) {
        console.log('🎯 Inside Geotab detected - auto-authenticating...');
        credentials = { internal: true };
        serverUsed = 'internal';
        document.getElementById('dvirSection').classList.remove('hidden');
        setDefaultDates();
      } else {
        setDefaultDates();
      }
    });

    function setDefaultDates() {
      const today = new Date();
      const lastWeek = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
      
      document.getElementById('toDate').value = today.toISOString().split('T')[0];
      document.getElementById('fromDate').value = lastWeek.toISOString().split('T')[0];
    }

    function showMessage(elementId, message, type = 'info') {
      const element = document.getElementById(elementId);
      const alertClass = type === 'error' ? 'alert-error' : 
                        type === 'success' ? 'alert-success' : 
                        type === 'warning' ? 'alert-warning' : 'alert-info';
      
      element.innerHTML = `<div class="alert ${alertClass}">${message}</div>`;
    }

    async function callGeotabAPI(method, params = {}) {
      // If inside Geotab, use internal API
      if (window.geotab && typeof window.geotab.call === 'function') {
        return new Promise((resolve, reject) => {
          window.geotab.call(method, params, resolve, reject);
        });
      }
      
      if (window.api && typeof window.api.call === 'function') {
        return new Promise((resolve, reject) => {
          window.api.call(method, params, resolve, reject);
        });
      }
      
      // External API
      const requestBody = {
        method: method,
        params: credentials ? { ...params, credentials: credentials } : params
      };

      const response = await fetch(`https://${serverUsed}/apiv1`, {
        method: "POST",
        headers: { 
          "Content-Type": "application/json",
          "Accept": "application/json"
        },
        body: JSON.stringify(requestBody)
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
      }

      const data = await response.json();
      
      if (data.error) {
        throw new Error(data.error.message || data.error.name);
      }
      
      return data.result;
    }

    // Extract ID from JSON object
    function extractId(jsonStr) {
      if (!jsonStr) return null;
      try {
        const parsed = JSON.parse(jsonStr);
        return parsed.id || null;
      } catch (e) {
        return null;
      }
    }

    // Authentication
    document.getElementById('authButton').onclick = async function() {
      const server = document.getElementById('server').value.trim();
      const database = document.getElementById('database').value.trim();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      
      if (!server || !database || !username || !password) {
        showMessage('authResult', 'Please fill in all fields', 'error');
        return;
      }
      
      try {
        showMessage('authResult', 'Authenticating...', 'warning');
        
        serverUsed = server;
        const result = await callGeotabAPI('Authenticate', {
          userName: username,
          password: password,
          database: database
        });
        
        if (result.path && result.path !== 'ThisServer') {
          serverUsed = result.path;
          showMessage('authResult', `Redirecting to ${result.path}...`, 'warning');
          
          const redirectResult = await callGeotabAPI('Authenticate', {
            userName: username,
            password: password,
            database: database
          });
          
          credentials = redirectResult.credentials;
        } else {
          credentials = result.credentials;
        }
        
        showMessage('authResult', 'Authentication successful!', 'success');
        document.getElementById('dvirSection').classList.remove('hidden');
        
      } catch (error) {
        showMessage('authResult', `Authentication failed: ${error.message}`, 'error');
      }
    };

    // Get DVIR Logs with Driver and Vehicle mapping
    document.getElementById('getDvir').onclick = async function() {
      if (!credentials && !window.geotab && !window.api) {
        showMessage('dvirResult', 'Not authenticated', 'error');
        return;
      }

      const fromDate = document.getElementById('fromDate').value;
      const toDate = document.getElementById('toDate').value;
      const resultsLimit = parseInt(document.getElementById('resultsLimit').value) || 100;
      
      if (!fromDate || !toDate) {
        showMessage('dvirResult', 'Please select both from and to dates', 'error');
        return;
      }
      
      try {
        showMessage('dvirResult', 'Getting DVIR logs...', 'warning');
        
        // Step 1: Get DVIR logs
        const dvirLogs = await callGeotabAPI('Get', {
          typeName: 'DVIRLog',
          search: {
            fromDate: fromDate + 'T00:00:00.000Z',
            toDate: toDate + 'T23:59:59.000Z'
          },
          resultsLimit: resultsLimit
        });
        
        if (!dvirLogs || dvirLogs.length === 0) {
          showMessage('dvirResult', 'No DVIR logs found for the selected date range', 'warning');
          return;
        }

        showMessage('dvirResult', `Found ${dvirLogs.length} DVIR logs. Getting driver and vehicle names...`, 'warning');

        // Step 2: Extract unique driver and device IDs
        const driverIds = new Set();
        const deviceIds = new Set();
        
        dvirLogs.forEach(log => {
          const driverId = extractId(log.driver);
          const deviceId = extractId(log.device);
          
          if (driverId) driverIds.add(driverId);
          if (deviceId) deviceIds.add(deviceId);
        });

        // Step 3: Build lookup calls for drivers and devices
        const lookupCalls = [];
        
        // Get all drivers
        Array.from(driverIds).forEach(id => {
          lookupCalls.push({
            method: 'Get',
            params: {
              typeName: 'User',
              search: { id: id }
            }
          });
        });
        
        // Get all devices
        Array.from(deviceIds).forEach(id => {
          lookupCalls.push({
            method: 'Get',
            params: {
              typeName: 'Device',
              search: { id: id }
            }
          });
        });

        // Step 4: Execute all lookups
        const lookupResults = await callGeotabAPI('ExecuteMultiCall', { calls: lookupCalls });
        
        // Step 5: Build name mappings
        const driverNames = {};
        const deviceNames = {};
        
        let resultIndex = 0;
        
        // Map driver results
        Array.from(driverIds).forEach(id => {
          const result = lookupResults[resultIndex++];
          if (result && result.length > 0) {
            const user = result[0];
            driverNames[id] = user.name || `${user.firstName || ''} ${user.lastName || ''}`.trim() || `Driver ${id}`;
          } else {
            driverNames[id] = `Driver ${id}`;
          }
        });
        
        // Map device results
        Array.from(deviceIds).forEach(id => {
          const result = lookupResults[resultIndex++];
          if (result && result.length > 0) {
            deviceNames[id] = result[0].name || `Device ${id}`;
          } else {
            deviceNames[id] = `Device ${id}`;
          }
        });

        // Step 6: Map DVIR data with readable names
        mappedDvirData = dvirLogs.map(log => {
          const driverId = extractId(log.driver);
          const deviceId = extractId(log.device);
          
          return {
            id: log.id,
            dateTime: new Date(log.dateTime).toLocaleString(),
            driverName: driverNames[driverId] || 'Unknown Driver',
            driverId: driverId || '',
            vehicleName: deviceNames[deviceId] || 'Unknown Vehicle',
            deviceId: deviceId || '',
            isSafeToOperate: log.isSafeToOperate,
            isInspectedByDriver: log.isInspectedByDriver,
            driverRemark: log.driverRemark || '',
            odometer: log.odometer || 0,
            engineHours: log.engineHours || 0,
            certifyDate: log.certifyDate ? new Date(log.certifyDate).toLocaleString() : '',
            repairDate: log.repairDate ? new Date(log.repairDate).toLocaleString() : '',
            logType: log.logType || ''
          };
        });

        // Step 7: Display results
        showMessage('dvirResult', `✅ Success! Mapped ${mappedDvirData.length} DVIR logs with driver and vehicle names`, 'success');
        displayMappedData(mappedDvirData);
        
      } catch (error) {
        showMessage('dvirResult', `❌ Failed to get DVIR logs: ${error.message}`, 'error');
      }
    };

    function displayMappedData(data) {
      const resultDiv = document.getElementById('dvirResult');
      
      let html = `
        <table class="dvir-table">
          <thead>
            <tr>
              <th>Date/Time</th>
              <th>Driver Name</th>
              <th>Vehicle Name</th>
              <th>Safe to Operate</th>
              <th>Driver Inspected</th>
              <th>Odometer (km)</th>
              <th>Engine Hours</th>
              <th>Driver Remarks</th>
              <th>Certified Date</th>
            </tr>
          </thead>
          <tbody>
      `;
      
      data.forEach(log => {
        const safeStatus = log.isSafeToOperate === true ? 
          '<span class="status-safe">SAFE</span>' : 
          log.isSafeToOperate === false ? 
          '<span class="status-unsafe">UNSAFE</span>' : 
          '<span class="status-unknown">UNKNOWN</span>';
          
        const inspectedStatus = log.isInspectedByDriver === true ? '✅ Yes' : '❌ No';
        
        html += `
          <tr>
            <td>${log.dateTime}</td>
            <td><strong>${log.driverName}</strong><br><small>ID: ${log.driverId}</small></td>
            <td><strong>${log.vehicleName}</strong><br><small>ID: ${log.deviceId}</small></td>
            <td>${safeStatus}</td>
            <td>${inspectedStatus}</td>
            <td>${log.odometer ? Math.round(log.odometer) : 'N/A'}</td>
            <td>${log.engineHours ? Math.round(log.engineHours * 10) / 10 : 'N/A'}</td>
            <td>${log.driverRemark || '<em>No remarks</em>'}</td>
            <td>${log.certifyDate || '<em>Not certified</em>'}</td>
          </tr>
        `;
      });
      
      html += `
          </tbody>
        </table>
      `;
      
      resultDiv.innerHTML += html;
    }

    // Download CSV
    document.getElementById('downloadCsv').onclick = function() {
      if (!mappedDvirData || mappedDvirData.length === 0) {
        showMessage('dvirResult', 'No mapped DVIR data to download. Get DVIR logs first!', 'warning');
        return;
      }
      
      let csvContent = '';
      const headers = [
        'DateTime', 'Driver_Name', 'Driver_ID', 'Vehicle_Name', 'Device_ID', 
        'Safe_To_Operate', 'Driver_Inspected', 'Odometer_km', 'Engine_Hours',
        'Driver_Remarks', 'Certified_Date', 'Log_Type'
      ];
      
      csvContent = headers.map(h => `"${h}"`).join(',') + '\n';
      
      mappedDvirData.forEach(row => {
        const values = [
          row.dateTime,
          row.driverName,
          row.driverId,
          row.vehicleName,
          row.deviceId,
          row.isSafeToOperate === true ? 'SAFE' : row.isSafeToOperate === false ? 'UNSAFE' : 'UNKNOWN',
          row.isInspectedByDriver === true ? 'YES' : 'NO',
          row.odometer || '',
          row.engineHours || '',
          row.driverRemark || '',
          row.certifyDate || '',
          row.logType || ''
        ];
        
        const escapedValues = values.map(value => `"${String(value).replace(/"/g, '""')}"`);
        csvContent += escapedValues.join(',') + '\n';
      });
      
      const timestamp = new Date().toISOString().slice(0, 19).replace(/[:.]/g, '-');
      const filename = `Geotab_DVIR_Mapped_${timestamp}.csv`;
      
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      
      if (link.download !== undefined) {
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', filename);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        showMessage('dvirResult', `📊 CSV file "${filename}" downloaded successfully!`, 'success');
      } else {
        alert('CSV download not supported in this browser');
      }
    };

    // Logout
    document.getElementById('logout').onclick = function() {
      credentials = null;
      serverUsed = null;
      mappedDvirData = null;
      document.getElementById('dvirSection').classList.add('hidden');
      document.getElementById('authResult').innerHTML = '';
      document.getElementById('dvirResult').innerHTML = '';
    };
  </script>
</body>
</html>
