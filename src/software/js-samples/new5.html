<script>
let credentials = null;
let serverUsed = null;
let mappedDvirData = [];

function setDefaultDates(){
  const today = new Date();
  const lastWeek = new Date(today.getTime() - 7*24*60*60*1000);
  document.getElementById('toDate').value = today.toISOString().split('T')[0];
  document.getElementById('fromDate').value = lastWeek.toISOString().split('T')[0];
}
setDefaultDates();

function showMessage(elId, msg, type='info'){
  const el = document.getElementById(elId);
  const c = type==='error'?'alert-error':type==='success'?'alert-success':type==='warning'?'alert-warning':'alert-info';
  el.style.display = '';
  el.innerHTML = `<div class="alert ${c}">${msg}</div>`;
}

function log(msg) {
  const debugEl = document.getElementById('debugLog');
  const timestamp = new Date().toLocaleTimeString();
  debugEl.innerHTML += `[${timestamp}] ${msg}<br>`;
  debugEl.scrollTop = debugEl.scrollHeight;
  console.log(`DEBUG: ${msg}`);
}

function updateProgress(current, total, text = '') {
  const container = document.getElementById('progressContainer');
  const bar = document.getElementById('progressBar');
  const textEl = document.getElementById('progressText');
  if (total === 0) { container.style.display = 'none'; return; }
  container.style.display = 'block';
  const percentage = Math.round((current / total) * 100);
  bar.style.width = `${percentage}%`;
  bar.textContent = `${percentage}%`;
  textEl.textContent = text || `Processing ${current} of ${total}...`;
}

async function callGeotabAPI(method, params={}){
  // Prefer in-Addin if present
  if (window.geotab && typeof window.geotab.call === 'function'){
    return new Promise((resolve,reject)=>window.geotab.call(method, params, resolve, reject));
  }
  if (window.api && typeof window.api.call === 'function'){
    return new Promise((resolve,reject)=>window.api.call(method, params, resolve, reject));
  }
  const requestBody = { method, params: credentials ? {...params, credentials} : params };
  const res = await fetch(`https://${serverUsed}/apiv1`, {
    method:'POST', headers:{'Content-Type':'application/json','Accept':'application/json'}, body: JSON.stringify(requestBody)
  });
  if(!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
  const data = await res.json();
  if(data.error) throw new Error(data.error.message || data.error.name);
  return data.result;
}

function extractId(data){
  if(!data) return null;
  if(typeof data==='object' && data.id) return data.id;
  if(typeof data==='string'){ try{ return JSON.parse(data).id || null }catch(e){ return data } }
  return null;
}

function extractLocation(loc){
  if(!loc) return {latitude:null, longitude:null};
  if(typeof loc==='object'){
    if(loc.location && loc.location.x != null && loc.location.y != null) return {latitude:loc.location.y, longitude:loc.location.x};
    if(loc.x != null && loc.y != null) return {latitude:loc.y, longitude:loc.x};
  }
  if(typeof loc==='string'){
    try{
      const p = JSON.parse(loc);
      if(p.location && p.location.x != null && p.location.y != null) return {latitude:p.location.y, longitude:p.location.x};
      if(p.x != null && p.y != null) return {latitude:p.y, longitude:p.x};
    }catch(e){}
  }
  return {latitude:null, longitude:null};
}


// ===== Engine Hours helpers =====
async function getEngineHoursDiagnosticId(){
  // Try common names
  const tryNames = ["Engine hours", "Engine Hours"];
  for (const name of tryNames){
    try{
      const res = await callGeotabAPI('Get', { typeName:'Diagnostic', search:{ name } });
      if (Array.isArray(res) && res.length) return res[0].id;
    }catch(e){ log(`Engine hours diagnostic search failed for "${name}": ${e.message}`); }
  }
  // Fallback: search by unitOfMeasure (HOUR) if available (broad, may return many)
  try{
    const res = await callGeotabAPI('Get', { typeName:'Diagnostic', search:{} });
    const match = Array.isArray(res) ? res.find(d => {
      const n = (d.name||'').toLowerCase();
      return n.includes('engine') && n.includes('hour');
    }) : null;
    if (match) return match.id;
  }catch(e){ log(`Diagnostic broad search failed: ${e.message}`); }
  return null;
}

async function getLatestEngineHoursForDevices(deviceIds, fromIso, toIso, engineHoursDiagId){
  if (!engineHoursDiagId || !deviceIds.length) return {};
  // Build ExecuteMultiCall with one StatusData query per device
  const calls = deviceIds.map(id => ({
    method:'Get',
    params: {
      typeName:'StatusData',
      search:{
        deviceSearch: { id },
        diagnosticSearch: { id: engineHoursDiagId },
        fromDate: fromIso,
        toDate: toIso
      },
      resultsLimit: 1,    // fastest: most APIs return latest first; if not, we pick last below
      sortBy: 'dateTime', // ensure chronological if supported
      order: 'DESC'       // request latest first if supported
    }
  }));
  let results = [];
  try {
    results = await callGeotabAPI('ExecuteMultiCall', { calls });
  } catch(e){
    log(`Engine hours ExecuteMultiCall failed: ${e.message}`);
    return {};
  }
  const map = {};
  deviceIds.forEach((devId, i) => {
    const arr = results[i] || [];
    let val = null;
    if (Array.isArray(arr) && arr.length){
      // Pick first if DESC worked, else last
      const rec = arr[0] || arr[arr.length-1];
      // Value may be in 'data' or 'data'->'value'
      if (rec && rec.data != null){
        if (typeof rec.data === 'object' && rec.data.value != null) val = rec.data.value;
        else if (typeof rec.data === 'number') val = rec.data;
      }
    }
    map[devId] = val;
  });
  return map;
}

function renderTable(rows){
  log(`🖼️ Rendering table with ${rows.length} rows`);
  const resultDiv = document.getElementById('dvirResult');
  let html = `<table class="dvir-table"><thead><tr>
    <th>Date/Time</th><th>Driver</th><th>Vehicle</th><th>Status</th>
    <th>Location</th><th>Odometer</th><th>Engine Hours</th><th>Remarks</th>
  </tr></thead><tbody>`;
  rows.forEach((r, index) => {
    const status = r.isSafeToOperate===true?'<span class="status-safe">SAFE</span>':
                  r.isSafeToOperate===false?'<span class="status-unsafe">⚠️ UNSAFE</span>':'<span class="status-unknown">UNKNOWN</span>';
    let locBlock = '<em class="muted">No location</em>';
    if (r.latitude != null && r.longitude != null) {
      const coords = `${Number(r.latitude).toFixed(6)}, ${Number(r.longitude).toFixed(6)}`;
      const address = r.formattedAddress || r.streetAddress;
      const zones = r.zones && r.zones.length ? r.zones.map(z=>`<span class="pill">${z}</span>`).join('') : '';
      if (address && address.trim()) {
        locBlock = `<div class="address-success">${address}</div><small class="muted">${coords}</small>${zones?`<div class="zones">${zones}</div>`:''}`;
      } else {
        locBlock = `<span class="address-fail">${coords}</span>`;
      }
    }
    html += `<tr>
      <td>${r.dateTime}</td>
      <td><strong>${r.driverName}</strong></td>
      <td><strong>${r.vehicleName}</strong></td>
      <td>${status}</td>
      <td>${locBlock}</td>
      <td>${r.odometer?Math.round(r.odometer)+' km':'N/A'}</td>
      <td>${(r.engineHours!=null)?(Number(r.engineHours).toFixed(1)+' h'):'N/A'}</td>
      <td>${r.driverRemark || '<em class="muted">None</em>'}</td>
    </tr>`;
  });
  html += `</tbody></table>`;
  resultDiv.innerHTML = html;
}

async function reverseGeocodeBatch(coords){
  // coords: [{lat, lon, idx}]
  if (coords.length === 0) return [];
  // Geotab expects {x: lon, y: lat}
  const geotabCoords = coords.map(c => ({ x: Number(c.lon), y: Number(c.lat) }));
  log(`🌍 Calling GetAddresses for ${geotabCoords.length} coordinate(s)`);
  const results = await callGeotabAPI('GetAddresses', { coordinates: geotabCoords });
  // results is array of ReverseGeocodeAddress objects
  return results.map(r => ({
    formattedAddress: (r && (r.formattedAddress || r.FormattedAddress)) || '',
    city: r && (r.city || r.City),
    country: r && (r.country || r.Country),
    postalCode: r && (r.postalCode || r.PostalCode),
    street: r && (r.street || r.Street),
    streetName: r && (r.streetName || r.StreetName),
    streetNumber: r && (r.streetNumber || r.StreetNumber),
    zones: (r && (r.zones || r.Zones) || []).map(z => (z && (z.name || z.Name)) || '').filter(Boolean)
  }));
}

async function resolveAddressesWithGeotab(rows){
  const points = [];
  rows.forEach((r, idx) => {
    if (r.latitude != null && r.longitude != null) {
      points.push({ lat: r.latitude, lon: r.longitude, idx });
    }
  });
  if (!points.length) return;
  const BATCH = 50; // safe batch size
  for (let start = 0; start < points.length; start += BATCH) {
    const chunk = points.slice(start, start + BATCH);
    updateProgress(start, points.length, `Reverse geocoding ${Math.min(start+BATCH, points.length)}/${points.length}...`);
    try {
      const addrs = await reverseGeocodeBatch(chunk);
      addrs.forEach((a, i) => {
        const rowIndex = chunk[i].idx;
        rows[rowIndex].formattedAddress = a.formattedAddress || '';
        rows[rowIndex].streetAddress = a.street || a.streetName || ''; // legacy field kept for UI
        rows[rowIndex].zones = a.zones || [];
      });
      renderTable(rows); // live refresh
    } catch (e) {
      log(`❌ ReverseGeocode error: ${e.message}`);
    }
  }
  updateProgress(points.length, points.length, 'Complete!');
}

document.getElementById('authButton').onclick = async function(){

  const username = document.getElementById('username').value.trim();

  try{
    showMessage('authResult','Authenticating...','warning');
    serverUsed = server;
    const res = await callGeotabAPI('Authenticate', { userName:username, password, database });
    if(res.path && res.path !== 'ThisServer'){
      serverUsed = res.path;
      const res2 = await callGeotabAPI('Authenticate', { userName:username, password, database });
      credentials = res2.credentials;
    } else {
      credentials = res.credentials;

    document.getElementById('dvirSection').style.display = '';

    showMessage('authResult',`Authentication failed: ${e.message}`,'error');
  }
};

document.getElementById('getDvir').onclick = async function(){
  if(!credentials && !window.geotab && !window.api){ showMessage('infoBanner','Not authenticated','error'); return; }
  document.getElementById('debugLog').innerHTML = '';
  log('🚀 Starting DVIR retrieval + reverse geocoding...');
  const fromDate = document.getElementById('fromDate').value;
  const toDate = document.getElementById('toDate').value;
  const resultsLimit = parseInt(document.getElementById('resultsLimit').value)||5;
  if(!fromDate || !toDate){ showMessage('infoBanner','Please select both from and to dates','error'); return; }
  showMessage('infoBanner','Getting DVIR logs...','warning');
  document.getElementById('downloadCsv').disabled = true;
  try{
    const dvirLogs = await callGeotabAPI('Get', {
      typeName:'DVIRLog',
      search:{ fromDate: fromDate+'T00:00:00.000Z', toDate: toDate+'T23:59:59.000Z' },
      resultsLimit
    });
    if(!dvirLogs || dvirLogs.length===0){ 
      showMessage('infoBanner','No DVIR logs for the selected range','warning'); 
      document.getElementById('dvirResult').innerHTML=''; 
      return; 
    }
    const driverIds = new Set(), deviceIds = new Set();
    dvirLogs.forEach(l=>{ const did = extractId(l.driver); const vid = extractId(l.device); if(did) driverIds.add(did); if(vid) deviceIds.add(vid); });
    const calls = [];
    Array.from(driverIds).forEach(id=>calls.push({method:'Get', params:{typeName:'User', search:{id}}}));
    Array.from(deviceIds).forEach(id=>calls.push({method:'Get', params:{typeName:'Device', search:{id}}}));
    const lookup = await callGeotabAPI('ExecuteMultiCall', { calls });
    const driverNames = {}; const deviceNames={}; let idx=0;
    Array.from(driverIds).forEach(id=>{ const r=lookup[idx++]; driverNames[id]=(r && r[0] && (r[0].name || `${r[0].firstName||''} ${r[0].lastName||''}`.trim())) || `Driver ${id}`; });
    Array.from(deviceIds).forEach(id=>{ const r=lookup[idx++]; deviceNames[id]=(r && r[0] && r[0].name) || `Device ${id}`; });
    mappedDvirData = dvirLogs.map(l=>{
      const driverId = extractId(l.driver);
      const deviceId = extractId(l.device);
      const loc = extractLocation(l.location);
      return {
        id:l.id,
        deviceId: deviceId,
        dateTime:new Date(l.dateTime).toLocaleString(),
        driverName:driverNames[driverId] || 'Unknown Driver',
        vehicleName:deviceNames[deviceId] || 'Unknown Vehicle',
        isSafeToOperate:l.isSafeToOperate,
        driverRemark:l.driverRemark || '',
        odometer:l.odometer || 0,
        engineHours:null,
        latitude:loc.latitude,
        longitude:loc.longitude,
        formattedAddress:'',
        streetAddress:'',
        zones:[]
      };
    });
    renderTable(mappedDvirData);

      const hoursMap = await getLatestEngineHoursForDevices(Array.from(deviceIds), fromIso, toIso, ehDiagId);
      mappedDvirData.forEach(r => {
        if (r.deviceId && hoursMap.hasOwnProperty(r.deviceId)){
          r.engineHours = hoursMap[r.deviceId];
        }
      });
      renderTable(mappedDvirData);
    }

    showMessage('infoBanner', `🌍 Resolving addresses (Geotab) for ${mappedDvirData.length} DVIR rows...`, 'info');
    await resolveAddressesWithGeotab(mappedDvirData);
    const successCount = mappedDvirData.filter(r => r.formattedAddress && r.formattedAddress.trim()).length;
    const withCoords = mappedDvirData.filter(r => r.latitude!=null && r.longitude!=null).length;
    if (successCount){
      showMessage('infoBanner', `✅ Addresses resolved: ${successCount}/${withCoords}`, 'success');
    } else {
      showMessage('infoBanner', `❌ No addresses resolved from coordinates`, 'error');
    }
    document.getElementById('downloadCsv').disabled = false;
  }catch(e){
    showMessage('infoBanner', `Failed: ${e.message}`, 'error');
    log(`❌ CRITICAL ERROR: ${e.message}`);
  }
};

document.getElementById('downloadCsv').onclick = function(){
  if(!mappedDvirData || mappedDvirData.length===0){ showMessage('infoBanner','No DVIR data to export','warning'); return; }
  const headers = ['DateTime','Driver','Vehicle','Safe_To_Operate','FormattedAddress','Zones','Latitude','Longitude','Odometer_km','Engine_Hours_h','Remarks'];
  let csv = headers.map(h=>`"${h}"`).join(',') + '\n';
  mappedDvirData.forEach(r=>{
    const row = [
      r.dateTime, r.driverName, r.vehicleName,
      r.isSafeToOperate===true?'SAFE':r.isSafeToOperate===false?'UNSAFE':'UNKNOWN',
      r.formattedAddress || r.streetAddress || '',
      (r.zones||[]).join(' | '),
      (r.latitude!=null?r.latitude:''),
      (r.longitude!=null?r.longitude:''),
      r.odometer || '',
      (r.engineHours!=null?Number(r.engineHours).toFixed(1):''),
      r.driverRemark || ''
    ].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',');
    csv += row + '\n';
  });
  const ts = new Date().toISOString().slice(0,19).replace(/[:.]/g,'-');
  const filename = `DVIR_GeotabReverseGeocode_${ts}.csv`;
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  const url = URL.createObjectURL(blob);
  a.href = url; a.download = filename; a.style.display='none';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  showMessage('infoBanner', `📊 CSV "${filename}" downloaded`, 'success');
};

document.getElementById('logout').onclick = function(){
  credentials = null; serverUsed = null; mappedDvirData = [];
  document.getElementById('dvirSection').style.display = 'none';
  document.getElementById('authResult').innerHTML = '';
  document.getElementById('dvirResult').innerHTML = '';
  document.getElementById('debugLog').innerHTML = '';
  showMessage('infoBanner','Logged out','info');
};

// If loaded inside MyGeotab, auto-show app section
if (window.geotab || window.api || (window.location && /geotab\.com/i.test(window.location.host))) {
  document.getElementById('dvirSection').style.display='';
}
</script>
</body>
</html>
