<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geotab DVIR Logs</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: #333;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .header h1 {
      color: #2d3748;
      font-size: 2em;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .card-title {
      color: #2d3748;
      font-size: 1.3em;
      font-weight: 700;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e2e8f0;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 15px;
    }

    .form-control {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .form-control:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin: 5px;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .btn-success {
      background: linear-gradient(135deg, #48bb78, #38a169);
      color: white;
    }

    .btn-info {
      background: linear-gradient(135deg, #4299e1, #3182ce);
      color: white;
    }

    .btn-danger {
      background: linear-gradient(135deg, #f56565, #e53e3e);
      color: white;
    }

    .alert {
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
      font-weight: 500;
    }

    .alert-success {
      background: #c6f6d5;
      color: #22543d;
      border-left: 4px solid #38a169;
    }

    .alert-error {
      background: #fed7d7;
      color: #742a2a;
      border-left: 4px solid #e53e3e;
    }

    .alert-warning {
      background: #fefcbf;
      color: #744210;
      border-left: 4px solid #d69e2e;
    }

    .result-container {
      background: #1a202c;
      color: #e2e8f0;
      padding: 20px;
      border-radius: 8px;
      margin-top: 15px;
      max-height: 400px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.4;
    }

    .hidden {
      display: none !important;
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>Geotab Asset Inspection Sheets</h1>
      <p>Asset Inspection Report Logs</p>
    </div>

    <!-- Authentication Section -->
    <div class="card">
      <h3 class="card-title">🔐 Authentication</h3>
      <div class="form-row">
        <input id="server" class="form-control" placeholder="Server" value="my.geotab.com">
        <input id="database" class="form-control" placeholder="Database" value="uccnz">
      </div>
      <div class="form-row">
        <input id="username" class="form-control" placeholder="Username" value="francis@directt.co.nz">
        <input id="password" class="form-control" type="password" placeholder="Password" value="@fr4nc1sWynn5">
      </div>
      <button id="authButton" class="btn btn-primary">🔑 Authenticate</button>
      <div id="authResult"></div>
    </div>

    <!-- DVIR Section -->
    <div id="dvirSection" class="card hidden">
      <h3 class="card-title">📋 DVIR Logs</h3>
      
      <div class="alert alert-success">
        ✅ <strong>Authenticated Successfully!</strong> Ready to get DVIR logs
      </div>

      <div class="form-row">
        <input id="fromDate" class="form-control" type="date" placeholder="From Date">
        <input id="toDate" class="form-control" type="date" placeholder="To Date">
        <input id="resultsLimit" class="form-control" placeholder="Results Limit" value="50">
      </div>
      
      <div>
        <button id="getDvir" class="btn btn-success">📋 Get DVIR Logs</button>
        <button id="downloadCsv" class="btn btn-info">📊 Download CSV</button>
        <button id="logout" class="btn btn-danger">🚪 Logout</button>
      </div>
      
      <div id="dvirResult"></div>
    </div>
  </div>

  <script>
    let credentials = null;
    let serverUsed = null;
    let lastDvirResult = null;

    // Auto-detect if inside Geotab
    window.addEventListener('load', function() {
      if (window.geotab || window.api || window.location.host.includes('geotab.com')) {
        console.log('🎯 Inside Geotab detected - auto-authenticating...');
        credentials = { internal: true };
        serverUsed = 'internal';
        document.getElementById('dvirSection').classList.remove('hidden');
        setDefaultDates();
      } else {
        setDefaultDates();
      }
    });

    function setDefaultDates() {
      const today = new Date();
      const lastWeek = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
      
      document.getElementById('toDate').value = today.toISOString().split('T')[0];
      document.getElementById('fromDate').value = lastWeek.toISOString().split('T')[0];
    }

    function showMessage(elementId, message, type = 'info') {
      const element = document.getElementById(elementId);
      const alertClass = type === 'error' ? 'alert-error' : 
                        type === 'success' ? 'alert-success' : 
                        type === 'warning' ? 'alert-warning' : 'alert-info';
      
      element.innerHTML = `<div class="alert ${alertClass}">${message}</div>`;
    }

    async function callGeotabAPI(method, params = {}) {
      // If inside Geotab, use internal API
      if (window.geotab && typeof window.geotab.call === 'function') {
        console.log(`🔗 Using internal Geotab API: ${method}`);
        return new Promise((resolve, reject) => {
          window.geotab.call(method, params, resolve, reject);
        });
      }
      
      if (window.api && typeof window.api.call === 'function') {
        console.log(`🔗 Using window.api: ${method}`);
        return new Promise((resolve, reject) => {
          window.api.call(method, params, resolve, reject);
        });
      }
      
      // External API
      console.log(`🌐 Using external API: ${method}`);
      const requestBody = {
        method: method,
        params: credentials ? { ...params, credentials: credentials } : params
      };

      const response = await fetch(`https://${serverUsed}/apiv1`, {
        method: "POST",
        headers: { 
          "Content-Type": "application/json",
          "Accept": "application/json"
        },
        body: JSON.stringify(requestBody)
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
      }

      const data = await response.json();
      
      if (data.error) {
        throw new Error(data.error.message || data.error.name);
      }
      
      return data.result;
    }

    // Authentication
    document.getElementById('authButton').onclick = async function() {
      const server = document.getElementById('server').value.trim();
      const database = document.getElementById('database').value.trim();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      
      if (!server || !database || !username || !password) {
        showMessage('authResult', 'Please fill in all fields', 'error');
        return;
      }
      
      try {
        showMessage('authResult', 'Authenticating...', 'warning');
        
        serverUsed = server;
        const result = await callGeotabAPI('Authenticate', {
          userName: username,
          password: password,
          database: database
        });
        
        if (result.path && result.path !== 'ThisServer') {
          serverUsed = result.path;
          showMessage('authResult', `Redirecting to ${result.path}...`, 'warning');
          
          const redirectResult = await callGeotabAPI('Authenticate', {
            userName: username,
            password: password,
            database: database
          });
          
          credentials = redirectResult.credentials;
        } else {
          credentials = result.credentials;
        }
        
        showMessage('authResult', 'Authentication successful!', 'success');
        document.getElementById('dvirSection').classList.remove('hidden');
        
      } catch (error) {
        showMessage('authResult', `Authentication failed: ${error.message}`, 'error');
      }
    };

    // Get DVIR Logs
    document.getElementById('getDvir').onclick = async function() {
      if (!credentials && !window.geotab && !window.api) {
        showMessage('dvirResult', 'Not authenticated', 'error');
        return;
      }

      const fromDate = document.getElementById('fromDate').value;
      const toDate = document.getElementById('toDate').value;
      const resultsLimit = parseInt(document.getElementById('resultsLimit').value) || 50;
      
      if (!fromDate || !toDate) {
        showMessage('dvirResult', 'Please select both from and to dates', 'error');
        return;
      }
      
      try {
        showMessage('dvirResult', 'Getting DVIR logs...', 'warning');
        
        const params = {
          typeName: 'DVIRLog',
          search: {
            fromDate: fromDate + 'T00:00:00.000Z',
            toDate: toDate + 'T23:59:59.000Z'
          },
          resultsLimit: resultsLimit
        };
        
        const result = await callGeotabAPI('Get', params);
        
        const resultCount = Array.isArray(result) ? result.length : (result ? 1 : 0);
        showMessage('dvirResult', `✅ Success! Found ${resultCount} DVIR log(s)`, 'success');
        
        document.getElementById('dvirResult').innerHTML += 
          `<div class="result-container">${JSON.stringify(result, null, 2)}</div>`;
        
        lastDvirResult = result;
        
      } catch (error) {
        showMessage('dvirResult', `❌ Failed to get DVIR logs: ${error.message}`, 'error');
      }
    };

    // Download CSV
    document.getElementById('downloadCsv').onclick = function() {
      if (!lastDvirResult) {
        showMessage('dvirResult', 'No DVIR data to download. Get DVIR logs first!', 'warning');
        return;
      }
      
      let csvContent = '';
      
      if (Array.isArray(lastDvirResult) && lastDvirResult.length > 0) {
        const headers = Object.keys(lastDvirResult[0]);
        csvContent = headers.map(h => `"${h}"`).join(',') + '\n';
        
        lastDvirResult.forEach(row => {
          const values = headers.map(header => {
            const value = row[header];
            if (value === null || value === undefined) return '""';
            if (typeof value === 'object') return `"${JSON.stringify(value).replace(/"/g, '""')}"`;
            return `"${String(value).replace(/"/g, '""')}"`;
          });
          csvContent += values.join(',') + '\n';
        });
      } else {
        csvContent = '"Message"\n"No DVIR data found"';
      }
      
      const timestamp = new Date().toISOString().slice(0, 19).replace(/[:.]/g, '-');
      const filename = `Geotab_DVIR_Logs_${timestamp}.csv`;
      
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      
      if (link.download !== undefined) {
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', filename);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        showMessage('dvirResult', `📊 CSV file "${filename}" downloaded successfully!`, 'success');
      } else {
        alert('CSV download not supported in this browser');
      }
    };

    // Logout
    document.getElementById('logout').onclick = function() {
      credentials = null;
      serverUsed = null;
      lastDvirResult = null;
      document.getElementById('dvirSection').classList.add('hidden');
      document.getElementById('authResult').innerHTML = '';
      document.getElementById('dvirResult').innerHTML = '';
    };
  </script>
</body>
</html>
