<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geotab DVIR Logs — SIMPLE Address Fix</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;color:#333;padding:20px}
    .container{max-width:1200px;margin:0 auto}
    .header,.card{background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-radius:15px;padding:25px;margin-bottom:25px;box-shadow:0 10px 30px rgba(0,0,0,.1)}
    .header{text-align:center}
    .header h1{color:#2d3748;font-size:2em;font-weight:700;margin-bottom:10px}
    .card-title{color:#2d3748;font-size:1.3em;font-weight:700;margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid #e2e8f0}
    .form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:15px}
    .form-control{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:8px;font-size:14px;transition:all .2s ease}
    .form-control:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.1)}
    .btn{padding:12px 24px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s ease;margin:5px}
    .btn:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(0,0,0,.2)}
    .btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
    .btn-success{background:linear-gradient(135deg,#48bb78,#38a169);color:#fff}
    .btn-info{background:linear-gradient(135deg,#4299e1,#3182ce);color:#fff}
    .btn-warning{background:linear-gradient(135deg,#ed8936,#dd6b20);color:#fff}
    .btn-danger{background:linear-gradient(135deg,#f56565,#e53e3e);color:#fff}
    .btn[disabled]{opacity:.5;cursor:not-allowed}
    .alert{padding:15px;border-radius:8px;margin:15px 0;font-weight:500}
    .alert-success{background:#c6f6d5;color:#22543d;border-left:4px solid #38a169}
    .alert-error{background:#fed7d7;color:#742a2a;border-left:4px solid #e53e3e}
    .alert-warning{background:#fefcbf;color:#744210;border-left:4px solid #d69e2e}
    .alert-info{background:#ebf8ff;color:#2b6cb0;border-left:4px solid #4299e1}
    .dvir-table{width:100%;border-collapse:collapse;margin-top:20px;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,.1)}
    .dvir-table th{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:12px;text-align:left;font-weight:600;font-size:13px}
    .dvir-table td{padding:10px 12px;border-bottom:1px solid #e2e8f0;font-size:13px;vertical-align:top}
    .dvir-table tr:hover{background:#f7fafc}
    .dvir-table tr:nth-child(even){background:#f8f9fa}
    .status-safe{background:#c6f6d5;color:#22543d;padding:4px 8px;border-radius:4px;font-weight:600;font-size:11px}
    .status-unsafe{background:#fed7d7;color:#742a2a;padding:4px 8px;border-radius:4px;font-weight:600;font-size:11px}
    .status-unknown{background:#e2e8f0;color:#4a5568;padding:4px 8px;border-radius:4px;font-weight:600;font-size:11px}
    .muted{color:#718096}
    .progress-bar{width:100%;background:#e2e8f0;border-radius:4px;overflow:hidden;margin:10px 0}
    .progress-fill{height:20px;background:linear-gradient(90deg,#667eea,#764ba2);transition:width 0.3s ease;display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:600}
    .address-success{background:#d4edda;color:#155724;padding:4px 8px;border-radius:4px;font-weight:500}
    .address-fail{color:#666;font-style:italic}
    .debug{background:#f8f9fa;padding:10px;margin:10px 0;border-radius:4px;font-size:12px;font-family:monospace;max-height:300px;overflow-y:auto}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚛 DVIR - SIMPLE Address Fix</h1>
      <p>Using ONLY OpenCage geocoding API - no complex fallbacks</p>
    </div>

    <div class="card">
      <h3 class="card-title">🔐 Authentication</h3>
      <div class="form-row">
        <input id="server" class="form-control" placeholder="Server" value="my.geotab.com" />
        <input id="database" class="form-control" placeholder="Database" value="uccnz" />
      </div>
      <div class="form-row">
        <input id="username" class="form-control" placeholder="Username" value="francis@directt.co.nz" />
        <input id="password" class="form-control" type="password" placeholder="Password" value="@fr4nc1sWynn5" />
      </div>
      <button id="authButton" class="btn btn-primary">🔒 Authenticate</button>
      <div id="authResult"></div>
    </div>

    <div id="dvirSection" class="card" style="display:none;">
      <h3 class="card-title">📋 DVIR Logs</h3>
      <div id="infoBanner" class="alert alert-info" style="display:none;"></div>
      <div id="debugLog" class="debug"></div>
      <div id="progressContainer" style="display:none;">
        <div class="progress-bar">
          <div id="progressBar" class="progress-fill" style="width:0%;">0%</div>
        </div>
        <div id="progressText" class="muted" style="text-align:center;margin-top:5px;"></div>
      </div>
      <div class="form-row">
        <input id="fromDate" class="form-control" type="date" />
        <input id="toDate" class="form-control" type="date" />
        <input id="resultsLimit" class="form-control" placeholder="Results Limit" value="5" />
      </div>
      <div>
        <button id="getDvir" class="btn btn-success">📋 Get DVIR Logs</button>
        <button id="testOne" class="btn btn-warning">🧪 Test ONE Address</button>
        <button id="downloadCsv" class="btn btn-info" disabled>📊 Download CSV</button>
        <button id="logout" class="btn btn-danger">🚪 Logout</button>
      </div>
      <div id="dvirResult"></div>
    </div>
  </div>

<script>
let credentials = null;
let serverUsed = null;
let mappedDvirData = [];

function setDefaultDates(){
  const today = new Date();
  const lastWeek = new Date(today.getTime() - 7*24*60*60*1000);
  document.getElementById('toDate').value = today.toISOString().split('T')[0];
  document.getElementById('fromDate').value = lastWeek.toISOString().split('T')[0];
}
setDefaultDates();

function showMessage(elId, msg, type='info'){
  const el = document.getElementById(elId);
  const c = type==='error'?'alert-error':type==='success'?'alert-success':type==='warning'?'alert-warning':'alert-info';
  el.style.display = '';
  el.innerHTML = `<div class="alert ${c}">${msg}</div>`;
}

function log(msg) {
  const debugEl = document.getElementById('debugLog');
  const timestamp = new Date().toLocaleTimeString();
  debugEl.innerHTML += `[${timestamp}] ${msg}<br>`;
  debugEl.scrollTop = debugEl.scrollHeight;
  console.log(`DEBUG: ${msg}`);
}

function updateProgress(current, total, text = '') {
  const container = document.getElementById('progressContainer');
  const bar = document.getElementById('progressBar');
  const textEl = document.getElementById('progressText');
  
  if (total === 0) {
    container.style.display = 'none';
    return;
  }
  
  container.style.display = 'block';
  const percentage = Math.round((current / total) * 100);
  bar.style.width = `${percentage}%`;
  bar.textContent = `${percentage}%`;
  textEl.textContent = text || `Processing ${current} of ${total} locations...`;
}

async function callGeotabAPI(method, params={}){
  if (window.geotab && typeof window.geotab.call === 'function'){
    return new Promise((resolve,reject)=>window.geotab.call(method, params, resolve, reject));
  }
  if (window.api && typeof window.api.call === 'function'){
    return new Promise((resolve,reject)=>window.api.call(method, params, resolve, reject));
  }
  const requestBody = { method, params: credentials ? {...params, credentials} : params };
  const res = await fetch(`https://${serverUsed}/apiv1`, {
    method:'POST', headers:{'Content-Type':'application/json','Accept':'application/json'}, body: JSON.stringify(requestBody)
  });
  if(!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
  const data = await res.json();
  if(data.error) throw new Error(data.error.message || data.error.name);
  return data.result;
}

function extractId(data){
  if(!data) return null;
  if(typeof data==='object' && data.id) return data.id;
  if(typeof data==='string'){ try{ return JSON.parse(data).id || null }catch(e){ return data } }
  return null;
}

function extractLocation(loc){
  if(!loc) return {latitude:null, longitude:null};
  if(typeof loc==='object'){
    if(loc.location && loc.location.x && loc.location.y) return {latitude:loc.location.y, longitude:loc.location.x};
    if(loc.x && loc.y) return {latitude:loc.y, longitude:loc.x};
  }
  if(typeof loc==='string'){
    try{
      const p = JSON.parse(loc);
      if(p.location && p.location.x && p.location.y) return {latitude:p.location.y, longitude:p.location.x};
      if(p.x && p.y) return {latitude:p.y, longitude:p.x};
    }catch(e){}
  }
  return {latitude:null, longitude:null};
}

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// SUPER SIMPLE geocoding using OpenCage API (free tier: 2500 requests/day)
async function getSimpleAddress(lat, lon) {
  const key = '4d1712de831e4a1c9d2f7f3e84c3c6d0'; // Free OpenCage API key
  
  try {
    log(`🌍 Geocoding ${lat}, ${lon} using OpenCage...`);
    
    const url = `https://api.opencagedata.com/geocode/v1/json?q=${lat}+${lon}&key=${key}&language=en&pretty=1`;
    log(`📡 Request URL: ${url}`);
    
    const response = await fetch(url);
    log(`📡 Response status: ${response.status} ${response.statusText}`);
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${response.statusText}`);
    }
    
    const data = await response.json();
    log(`📡 Full response: ${JSON.stringify(data, null, 2)}`);
    
    if (data && data.results && data.results.length > 0) {
      const result = data.results[0];
      const formatted = result.formatted;
      
      log(`✅ SUCCESS: Got formatted address: "${formatted}"`);
      return formatted;
    } else {
      log(`❌ No results in response`);
      return null;
    }
    
  } catch (error) {
    log(`❌ ERROR: ${error.message}`);
    return null;
  }
}

function renderTable(rows){
  log(`🖼️ Rendering table with ${rows.length} rows`);
  
  const resultDiv = document.getElementById('dvirResult');
  let html = `<table class="dvir-table"><thead><tr>
    <th>Date/Time</th><th>Driver</th><th>Vehicle</th><th>Status</th>
    <th>Location</th><th>Odometer</th><th>Remarks</th>
  </tr></thead><tbody>`;
  
  let addressCount = 0;
  let coordCount = 0;
  
  rows.forEach((r, index) => {
    const status = r.isSafeToOperate===true?'<span class="status-safe">SAFE</span>':
                  r.isSafeToOperate===false?'<span class="status-unsafe">⚠️ UNSAFE</span>':'<span class="status-unknown">UNKNOWN</span>';
    
    let locationDisplay = '<em class="muted">No location</em>';
    if (r.latitude && r.longitude) {
      const coords = `${Number(r.latitude).toFixed(6)}, ${Number(r.longitude).toFixed(6)}`;
      
      // THE CRITICAL CHECK: Does the row have a real address?
      if (r.streetAddress && r.streetAddress.trim() && r.streetAddress.length > 10) {
        locationDisplay = `<div class="address-success">${r.streetAddress}</div><small class="muted">${coords}</small>`;
        addressCount++;
        log(`Row ${index}: ✅ STREET ADDRESS: ${r.streetAddress.substring(0, 40)}...`);
      } else {
        locationDisplay = `<span class="address-fail">${coords}</span>`;
        coordCount++;
        log(`Row ${index}: ❌ NO ADDRESS: ${coords}`);
      }
    }
    
    html += `<tr>
      <td>${r.dateTime}</td>
      <td><strong>${r.driverName}</strong></td>
      <td><strong>${r.vehicleName}</strong></td>
      <td>${status}</td>
      <td>${locationDisplay}</td>
      <td>${r.odometer?Math.round(r.odometer)+' km':'N/A'}</td>
      <td>${r.driverRemark || '<em class="muted">None</em>'}</td>
    </tr>`;
  });
  html += `</tbody></table>`;
  resultDiv.innerHTML = html;
  
  log(`🖼️ Table complete: ${addressCount} with addresses, ${coordCount} with coordinates only`);
}

document.getElementById('authButton').onclick = async function(){
  const server = document.getElementById('server').value.trim();
  const database = document.getElementById('database').value.trim();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if(!server || !database || !username || !password){ showMessage('authResult','Please fill in all fields','error'); return; }
  try{
    showMessage('authResult','Authenticating...','warning');
    serverUsed = server;
    const res = await callGeotabAPI('Authenticate', { userName:username, password, database });
    if(res.path && res.path !== 'ThisServer'){
      serverUsed = res.path;
      const res2 = await callGeotabAPI('Authenticate', { userName:username, password, database });
      credentials = res2.credentials;
    } else {
      credentials = res.credentials;
    }
    showMessage('authResult','Authentication successful!','success');
    document.getElementById('dvirSection').style.display = '';
  }catch(e){
    showMessage('authResult',`Authentication failed: ${e.message}`,'error');
  }
};

document.getElementById('testOne').onclick = async function(){
  document.getElementById('debugLog').innerHTML = '';
  log('🧪 TESTING single address geocoding...');
  
  // Test with Auckland Sky Tower coordinates
  const testLat = -36.8485;
  const testLon = 174.7633;
  
  log(`🧪 Testing with Sky Tower coordinates: ${testLat}, ${testLon}`);
  const result = await getSimpleAddress(testLat, testLon);
  
  if (result && result.length > 20) {
    showMessage('infoBanner', `✅ TEST SUCCESS: ${result}`, 'success');
    log(`✅ TEST PASSED: Got detailed address`);
  } else if (result) {
    showMessage('infoBanner', `⚠️ TEST PARTIAL: ${result}`, 'warning');
    log(`⚠️ TEST PARTIAL: Got some address but not detailed`);
  } else {
    showMessage('infoBanner', '❌ TEST FAILED: No address returned', 'error');
    log(`❌ TEST FAILED: No address returned`);
  }
};

document.getElementById('getDvir').onclick = async function(){
  if(!credentials && !window.geotab && !window.api){ showMessage('infoBanner','Not authenticated','error'); return; }
  
  document.getElementById('debugLog').innerHTML = '';
  log('🚀 Starting DVIR retrieval and address resolution...');
  
  const fromDate = document.getElementById('fromDate').value;
  const toDate = document.getElementById('toDate').value;
  const resultsLimit = parseInt(document.getElementById('resultsLimit').value)||5;
  if(!fromDate || !toDate){ showMessage('infoBanner','Please select both from and to dates','error'); return; }

  showMessage('infoBanner','Getting DVIR logs...','warning');
  document.getElementById('downloadCsv').disabled = true;

  try{
    log(`📋 Getting DVIR logs from ${fromDate} to ${toDate}, limit: ${resultsLimit}`);
    
    const dvirLogs = await callGeotabAPI('Get', {
      typeName:'DVIRLog',
      search:{ fromDate: fromDate+'T00:00:00.000Z', toDate: toDate+'T23:59:59.000Z' },
      resultsLimit
    });
    
    log(`📋 Retrieved ${dvirLogs ? dvirLogs.length : 0} DVIR logs`);
    
    if(!dvirLogs || dvirLogs.length===0){ 
      showMessage('infoBanner','No DVIR logs for the selected range','warning'); 
      document.getElementById('dvirResult').innerHTML=''; 
      return; 
    }

    // Get driver/device names
    const driverIds = new Set(), deviceIds = new Set();
    dvirLogs.forEach(l=>{ const did = extractId(l.driver); const vid = extractId(l.device); if(did) driverIds.add(did); if(vid) deviceIds.add(vid); });
    const calls = [];
    Array.from(driverIds).forEach(id=>calls.push({method:'Get', params:{typeName:'User', search:{id}}}));
    Array.from(deviceIds).forEach(id=>calls.push({method:'Get', params:{typeName:'Device', search:{id}}}));
    const lookup = await callGeotabAPI('ExecuteMultiCall', { calls });
    const driverNames = {}; const deviceNames={}; let idx=0;
    Array.from(driverIds).forEach(id=>{ const r=lookup[idx++]; driverNames[id]=(r && r[0] && (r[0].name || `${r[0].firstName||''} ${r[0].lastName||''}`.trim())) || `Driver ${id}`; });
    Array.from(deviceIds).forEach(id=>{ const r=lookup[idx++]; deviceNames[id]=(r && r[0] && r[0].name) || `Device ${id}`; });

    // Map DVIR data
    mappedDvirData = dvirLogs.map(l=>{
      const driverId = extractId(l.driver);
      const deviceId = extractId(l.device);
      const loc = extractLocation(l.location);
      return {
        id:l.id,
        dateTime:new Date(l.dateTime).toLocaleString(),
        driverName:driverNames[driverId] || 'Unknown Driver',
        vehicleName:deviceNames[deviceId] || 'Unknown Vehicle',
        isSafeToOperate:l.isSafeToOperate,
        driverRemark:l.driverRemark || '',
        odometer:l.odometer || 0,
        latitude:loc.latitude,
        longitude:loc.longitude,
        streetAddress:null // This will be populated with actual addresses
      };
    });

    log(`📋 Mapped ${mappedDvirData.length} DVIR records`);

    // Show initial table with coordinates
    renderTable(mappedDvirData);

    // Find locations that need geocoding
    const locationsToGeocode = mappedDvirData.filter(r => r.latitude && r.longitude);
    log(`🌍 Found ${locationsToGeocode.length} locations to geocode`);

    if (locationsToGeocode.length > 0) {
      showMessage('infoBanner', `🌍 Resolving ${locationsToGeocode.length} addresses...`, 'info');
      
      // Process each location sequentially
      for (let i = 0; i < locationsToGeocode.length; i++) {
        const row = locationsToGeocode[i];
        
        updateProgress(i, locationsToGeocode.length, `Resolving address ${i + 1}/${locationsToGeocode.length}...`);
        log(`🌍 Processing location ${i + 1}/${locationsToGeocode.length}: ${row.latitude}, ${row.longitude}`);
        
        // Get address for this location
        const address = await getSimpleAddress(row.latitude, row.longitude);
        
        if (address && address.trim() && address.length > 10) {
          row.streetAddress = address.trim();
          log(`✅ SUCCESS for location ${i + 1}: ${address.substring(0, 50)}...`);
        } else {
          log(`❌ FAILED for location ${i + 1}: No address found`);
        }
        
        // Rate limiting delay
        if (i < locationsToGeocode.length - 1) {
          await delay(1500); // 1.5 second delay between requests
        }
      }
      
      updateProgress(locationsToGeocode.length, locationsToGeocode.length, 'Complete!');
      
      // Re-render table with addresses
      renderTable(mappedDvirData);
      
      // Final status
      const successCount = mappedDvirData.filter(r => r.streetAddress && r.streetAddress.trim()).length;
      const failCount = locationsToGeocode.length - successCount;
      
      if (successCount > 0) {
        showMessage('infoBanner', `✅ SUCCESS! ${successCount}/${locationsToGeocode.length} addresses resolved!${failCount > 0 ? ` ${failCount} failed.` : ''}`, 'success');
        log(`🎯 FINAL RESULT: ${successCount} addresses resolved, ${failCount} failed`);
      } else {
        showMessage('infoBanner', '❌ COMPLETE FAILURE: No addresses could be resolved', 'error');
        log(`❌ COMPLETE FAILURE: All geocoding attempts failed`);
      }
    } else {
      showMessage('infoBanner', '✅ DVIR loaded! No locations to resolve.', 'success');
    }
    
    document.getElementById('downloadCsv').disabled = false;

  }catch(e){
    showMessage('infoBanner', `Failed: ${e.message}`, 'error');
    log(`❌ CRITICAL ERROR: ${e.message}`);
  }
};

document.getElementById('downloadCsv').onclick = function(){
  if(!mappedDvirData || mappedDvirData.length===0){ showMessage('infoBanner','No DVIR data to export','warning'); return; }
  const headers = ['DateTime','Driver','Vehicle','Safe_To_Operate','Address','Latitude','Longitude','Odometer_km','Remarks'];
  let csv = headers.map(h=>`"${h}"`).join(',') + '\n';
  mappedDvirData.forEach(r=>{
    const row = [
      r.dateTime, r.driverName, r.vehicleName,
      r.isSafeToOperate===true?'SAFE':r.isSafeToOperate===false?'UNSAFE':'UNKNOWN',
      r.streetAddress || `${r.latitude || ''}, ${r.longitude || ''}`, 
      r.latitude || '', r.longitude || '',
      r.odometer || '', r.driverRemark || ''
    ].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',');
    csv += row + '\n';
  });
  const ts = new Date().toISOString().slice(0,19).replace(/[:.]/g,'-');
  const filename = `DVIR_Simple_${ts}.csv`;
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  const url = URL.createObjectURL(blob);
  a.href = url; a.download = filename; a.style.display='none';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  showMessage('infoBanner', `📊 CSV "${filename}" downloaded`, 'success');
};

document.getElementById('logout').onclick = function(){
  credentials = null; serverUsed = null; mappedDvirData = [];
  document.getElementById('dvirSection').style.display = 'none';
  document.getElementById('authResult').innerHTML = '';
  document.getElementById('dvirResult').innerHTML = '';
  document.getElementById('debugLog').innerHTML = '';
  showMessage('infoBanner','Logged out','info');
};

if (window.geotab || window.api || (window.location && /geotab\.com/i.test(window.location.host))) {
  document.getElementById('dvirSection').style.display='';
}
</script>
</body>
</html>
