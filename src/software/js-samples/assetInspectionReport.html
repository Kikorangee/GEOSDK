<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asset Inspection + Engine Hours</title>

  <!-- Load official Geotab API -->
  <script src="https://my.geotab.com/sdk/js/GeotabApi.js"></script>

  <!-- Bootstrap for quick table styling -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-3">

  <h2>Asset Inspection + Engine Hours</h2>
  
  <!-- Connection UI -->
  <div class="mb-3">
    <input type="text" id="server" placeholder="my.geotab.com or my6.geotab.com" class="form-control mb-2">
    <input type="text" id="database" placeholder="Database" class="form-control mb-2">
    <input type="text" id="username" placeholder="Username" class="form-control mb-2">
    <input type="password" id="password" placeholder="Password" class="form-control mb-2">
    <button id="connect" class="btn btn-primary">Connect</button>
  </div>

  <!-- Status banner -->
  <div id="banner" class="alert alert-info d-none"></div>

  <!-- Results table -->
  <table id="results" class="table table-striped table-sm">
    <thead>
      <tr>
        <th>Reporting Date</th>
        <th>Device</th>
        <th>License Plate</th>
        <th>Driver</th>
        <th>Is Safe</th>
        <th>Defects</th>
        <th>Odometer</th>
        <th>Address</th>
        <th>Engine Hours (as-of)</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <!-- Main logic -->
  <script src="assetInspectionReport.js"></script>
</body>
</html>
