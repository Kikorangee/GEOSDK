<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hubometer (Drive Add-in)</title>
  <style>
    :root { --fg:#1b1b1b; --muted:#666; --ok:#2e7d32; --warn:#b26a00; --err:#b00020; --bd:#d0d0d0; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; color:var(--fg); }
    .wrap { padding:16px; max-width:560px; margin:0 auto; }
    .row { display:flex; justify-content:space-between; margin:8px 0; }
    .k { color:var(--muted); min-width:120px; }
    .v { font-weight:600; }
    .field { margin:12px 0; }
    .field label { font-size:14px; color:var(--muted); display:block; margin-bottom:6px; }
    .field input { width:100%; font-size:18px; padding:10px 12px; border:1px solid var(--bd); border-radius:10px; }
    .actions { display:flex; gap:12px; margin-top:12px; }
    button { padding:10px 14px; border-radius:10px; border:1px solid #888; background:#f7f7f7; font-weight:600; cursor:pointer; }
    .primary { background:var(--ok); border-color:var(--ok); color:#fff; }
    .status { margin-top:10px; font-size:13px; color:var(--muted); }
    .status.ok { color:var(--ok); } .status.warn { color:var(--warn); } .status.err { color:var(--err); }
    .small { font-size:12px; color:var(--muted); margin-top:6px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    (function () {
      geotab = window.geotab || {};
      geotab.addin = geotab.addin || {};

      geotab.addin.hubometer = function (api, state) {
        var root, vehNameEl, prevEl, inputEl, statusEl, techEl;
        var prevValue = null, deviceId = null;
        var FIELD_KEY = "Hubometer_Last";
        var FIELD_UPDATED = "Hubometer_UpdatedAt";

        function toElem(container) {
          if (container && typeof container.querySelector === "function") return container;
          if (container && typeof container.get === "function") return container.get(0);
          if (typeof container === "string") return document.getElementById(container) || document.querySelector(container);
          return document.getElementById("root");
        }
        function fmtDT(iso){ try{var d=new Date(iso); if(!isNaN(d)) return d.toLocaleString();}catch(e){} return iso||""; }
        function setStatus(msg, cls){ statusEl.className = "status"+(cls?(" "+cls):""); statusEl.textContent = msg||""; }
        function setTech(msg){ techEl.textContent = msg||""; }

        function getCF(cfs, name){
          if(!Array.isArray(cfs)) return null;
          for(var i=0;i<cfs.length;i++){var f=cfs[i]; if(!f) continue; if(f.name===name || f.key===name) return f.value ?? f.stringValue ?? null;}
          return null;
        }
        function setCF(cfs, name, val){
          var arr = Array.isArray(cfs) ? cfs.filter(f => f && f.name !== name && f.key !== name) : [];
          arr.push({ name:name, value:String(val) });
          return arr;
        }
        function k(devId){ return "hubometer:last:"+ (devId||"unknown"); }
        function loadLocal(devId){ try{var r=localStorage.getItem(k(devId)); return r?JSON.parse(r):null;}catch(e){return null;} }
        function saveLocal(devId,obj){ try{ localStorage.setItem(k(devId), JSON.stringify(obj)); }catch(e){} }

        function loadPrevious(){
          setStatus("Loading last reading...");
          var dev = state && state.device ? state.device : null;
          if(!dev || !dev.id){ setStatus("No vehicle selected in Drive.","warn"); vehNameEl.textContent="Not selected"; return; }
          deviceId = dev.id; vehNameEl.textContent = dev.name || dev.description || dev.id;

          api.call("Get",{ typeName:"Device", search:{ id:deviceId } }, function(res){
            if(!res || !res.length){ setStatus("Vehicle not found.","err"); return; }
            var device = res[0];
            var last = getCF(device.customFields, FIELD_KEY);
            var updatedAt = getCF(device.customFields, FIELD_UPDATED);

            if(last != null && last !== ""){
              prevValue = parseFloat(last);
              inputEl.value = String(last);
              prevEl.textContent = String(last) + (isNaN(prevValue)?"":" km") + (updatedAt?(" (updated "+fmtDT(updatedAt)+")"):"");
              setStatus(""); setTech("Source: Device.customFields");
            } else {
              var local = loadLocal(deviceId);
              if(local && local.value != null){
                prevValue = parseFloat(local.value);
                inputEl.value = String(local.value);
                prevEl.textContent = String(local.value) + (isNaN(prevValue)?"":" km") + (local.updatedAt?(" (local, "+fmtDT(local.updatedAt)+")"):"");
                setTech("Source: Local storage");
              } else {
                prevEl.textContent = "— none recorded —"; setTech("");
              }
              setStatus("");
            }
          }, function(){
            var local = loadLocal(deviceId);
            if(local && local.value != null){
              prevValue = parseFloat(local.value);
              inputEl.value = String(local.value);
              prevEl.textContent = String(local.value) + (isNaN(prevValue)?"":" km") + (local.updatedAt?(" (local, "+fmtDT(local.updatedAt)+")"):"");
              setTech("Source: Local storage (server error)"); setStatus("");
            } else { setStatus("Could not load previous (server error).","warn"); prevEl.textContent="—"; setTech(""); }
          });
        }

        function onSave(){
          var raw = (inputEl.value||"").trim();
          if(!raw){ setStatus("Please enter a hubometer reading.","warn"); inputEl.focus(); return; }
          var num = parseFloat(raw);
          if(isNaN(num) || num < 0){ setStatus("Reading must be a non-negative number.","warn"); inputEl.focus(); return; }
          if(prevValue != null && !isNaN(prevValue) && num < prevValue){
            if(!confirm("This reading is less than the previous value. Continue?")) return;
          }
          setStatus("Saving...");
          var nowIso = new Date().toISOString();

          api.call("Get", { typeName:"Device", search:{ id:deviceId } }, function(res){
            if(!res || !res.length){ setStatus("Vehicle not found.","err"); return; }
            var device = res[0];
            var newCF = setCF(setCF(device.customFields, FIELD_KEY, num), FIELD_UPDATED, nowIso);
            api.call("Set", { typeName:"Device", entity:{ id:device.id, customFields:newCF } }, function(){
              prevValue = num;
              prevEl.textContent = String(num)+" km (updated "+fmtDT(nowIso)+")";
              setStatus("Saved to server.","ok"); setTech("Saved to Device.customFields");
              saveLocal(deviceId, { value:num, updatedAt:nowIso });
            }, function(){
              saveLocal(deviceId, { value:num, updatedAt:nowIso });
              prevValue = num;
              prevEl.textContent = String(num)+" km (saved locally "+fmtDT(nowIso)+")";
              setStatus("Saved locally (no server permission).","ok"); setTech("Local storage fallback");
            });
          }, function(){
            saveLocal(deviceId, { value:num, updatedAt:nowIso });
            prevValue = num;
            prevEl.textContent = String(num)+" km (saved locally "+fmtDT(nowIso)+")";
            setStatus("Saved locally (server unavailable).","ok"); setTech("Local storage fallback");
          });
        }

        return {
          initialize: function (container) {
            var el = toElem(container);
            el.innerHTML = ''
              + '<div class="wrap">'
              + '  <h2>Hubometer Reading</h2>'
              + '  <div class="row"><span class="k">Vehicle</span><span id="vehName" class="v">—</span></div>'
              + '  <div class="row"><span class="k">Previous</span><span id="prevVal" class="v">—</span></div>'
              + '  <div class="field"><label for="hubVal">Current reading (km)</label>'
              + '    <input id="hubVal" type="number" inputmode="decimal" step="0.1" min="0" placeholder="e.g., 128960.5"></div>'
              + '  <div class="actions"><button id="saveBtn" class="primary">Save</button></div>'
              + '  <div id="status" class="status"></div>'
              + '  <div class="small" id="tech"></div>'
              + '</div>';
            vehNameEl = el.querySelector("#vehName");
            prevEl = el.querySelector("#prevVal");
            inputEl = el.querySelector("#hubVal");
            statusEl = el.querySelector("#status");
            techEl = el.querySelector("#tech");
            el.querySelector("#saveBtn").addEventListener("click", onSave);
          },
          focus: function () { loadPrevious(); },
          blur: function () {}
        };
      };
    })();
  </script>
</body>
</html>
